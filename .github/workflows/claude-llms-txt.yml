name: Weekly llms.txt Audit

on:
  schedule:
    # Every Wednesday at 15:00 UTC (1 hour after release notes)
    - cron: "0 15 * * 3"
  workflow_dispatch:

concurrency:
  group: llms-txt
  cancel-in-progress: true

jobs:
  llms-txt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required: claude-code-action requests a GitHub OIDC token at startup

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="claude/llms-txt-$DATE"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          mkdir -p .scratch

      - name: Install subprocess isolation deps
        # Required by CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=1. The Claude CLI sandbox
        # needs both bubblewrap AND socat, and Ubuntu 24.04+ blocks the unprivileged
        # user namespaces it relies on by default. Mirrors the upstream action's
        # install step (which only runs when allowed_non_write_users is set).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap socat
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        env:
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Surface the full Claude SDK message stream in the step log instead of
          # the sanitized summary (denied-tool detail, tool calls, reasoning). Safe:
          # inputs are public repo/PR/issue content, registered secrets stay masked,
          # and the OIDC app token is never in Claude's context. Note: logs are public.
          show_full_output: 'true'
          prompt: |
            /phoenix-llms-txt

            Audit llms.txt for coverage against the docs tree. Add missing pages, remove stale entries, and verify descriptions are concise.

            If there are no changes needed, exit without making changes.

            When done, write a PR body to `.scratch/pr-body.md`. Do not commit,
            push, or open a PR; the workflow handles publishing.
          claude_args: '--model claude-opus-4-8 --allowedTools Skill,Read,Write,Edit,Glob,Grep,Agent,"Bash(git status:*)","Bash(git diff:*)","Bash(find:*)","Bash(comm:*)","Bash(sort:*)","Bash(wc:*)","Bash(mkdir:*)","Bash(ls:*)","Bash(date:*)"'

      - name: Commit and open pull request
        if: steps.claude.outcome == 'success'
        env:
          # Separate publishing token; the claude-code-action app token has
          # already been revoked by this point.
          GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No llms.txt changes — exiting cleanly."
            exit 0
          fi
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          blocked_files=$(git diff --name-only | awk '
            /^\.github\// ||
            /^\.cursor\// ||
            /^\.claude\// ||
            /^\.agents\// ||
            /(^|\/)AGENTS\.md$/ ||
            /(^|\/)CLAUDE\.md$/
          ')
          if [ -n "$blocked_files" ]; then
            echo "::warning::llms.txt audit changed automation or agent-instruction files; restoring them from origin/main."
            printf '%s\n' "$blocked_files"
            while IFS= read -r file; do
              if git cat-file -e "origin/main:$file" 2>/dev/null; then
                git restore --source=origin/main --worktree --staged -- "$file"
              else
                git restore --staged -- "$file" 2>/dev/null || true
                rm -f -- "$file"
              fi
            done <<< "$blocked_files"
          fi
          git add -A
          git commit -m "docs: audit and update llms.txt"
          git push -u origin "$BRANCH"
          if [ -s .scratch/pr-body.md ]; then
            BODY_FILE=.scratch/pr-body.md
          else
            BODY_FILE=$(mktemp)
            echo "Automated weekly llms.txt audit." > "$BODY_FILE"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: Audit and update llms.txt" \
            --body-file "$BODY_FILE"
