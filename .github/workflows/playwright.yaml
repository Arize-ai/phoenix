name: Playwright Tests
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - version-13
  pull_request:
    branches:
      - main
      - version-13
  schedule:
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

env:
  ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  changes:
    name: Filter Changes
    if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            e2e:
              - "src/**"
              - "app/**"
              - ".github/workflows/playwright.yaml"


  e2e-test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    needs: changes
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true') }}
    defaults:
      run:
        working-directory: ./app
    env:
      # We're skipping WebKit because of recurring issues with caching,
      # despite always installing it on cache-hit.
      CI_PLAYWRIGHT_SKIP_WEBKIT: true
    strategy:
      fail-fast: true
      matrix:
        py: [3.13]
        # large runners have more disk space, which we need for our in-runner phoenix db
        os: [oss-4-core-runner] # re-add macos-latest-large once billing is set
    steps:
      - uses: actions/checkout@v6
      - name: Install PNPM
        uses: pnpm/action-setup@v5
        with:
          package_json_file: app/package.json
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          cache-dependency-path: ./app/pnpm-lock.yaml
          node-version: lts/*
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm list --json | jq -r '.[0].devDependencies["@playwright/test"].version')" >> $GITHUB_ENV
      - name: Cache Playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ hashFiles('app/playwright.config.ts') }}
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps
      - name: Install system dependencies for WebKit
        # WebKit dependencies can't be cached and must always be installed.
        if: ${{ env.CI_PLAYWRIGHT_SKIP_WEBKIT != 'true' && steps.playwright-cache.outputs.cache-hit == 'true' }}
        run: pnpm exec playwright install-deps webkit
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
      - name: Install dependencies
        if: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
        run: uv sync --extra container
      - name: Install dependencies (with upgrade)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          echo ${{ matrix.py }} > ../.python-version
          uv sync --upgrade --extra container
      - name: Run Playwright tests
        run: pnpm test:e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-py${{ matrix.py }}-${{ matrix.os }}
          path: app/playwright-report/
          retention-days: 30

  ci-required:
    name: Playwright CI Required
    needs:
      - changes
      - e2e-test
    if: ${{ always() && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check all required jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI jobs passed or were skipped"

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [e2e-test]
    if: ${{ always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    steps:
      - name: Notify success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Daily Playwright tests passed\n${{ env.ACTIONS_RUN_URL }}"
            }
      - name: Notify failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨🚨🚨 DAILY PLAYWRIGHT TESTS FAILED 🚨🚨🚨\n${{ env.ACTIONS_RUN_URL }}"
            }
