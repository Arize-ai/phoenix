name: Check Card Links

on:
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - .github/.scripts/check-card-links.js
      - .github/workflows/check-card-links.yml
  workflow_dispatch:

jobs:
  card-link-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '24'

      - name: Run link checker
        id: run-check
        run: |
          set -e
          SUMMARY_PATH="card-links-summary.md"
          node .github/.scripts/check-card-links.js --root . --timeout 10 --verbose --github-annotations --summary-file "$SUMMARY_PATH" || echo "exit_code=$?" >> $GITHUB_OUTPUT
          echo "summary_path=$SUMMARY_PATH" >> $GITHUB_OUTPUT

      - name: Upload summary artifact (always)
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: card-links-summary
          path: ${{ steps.run-check.outputs.summary_path }}

      - name: Delete previous card links comment
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- card-links-check -->';
            for (const comment of comments) {
              if (comment.body.includes(marker)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

      - name: Comment on PR with summary
        if: ${{ github.event_name == 'pull_request' && always() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const summaryPath = '${{ steps.run-check.outputs.summary_path }}';
            const body = '<!-- card-links-check -->\n' + fs.readFileSync(summaryPath, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Write to Job Summary
        if: always()
        run: cat ${{ steps.run-check.outputs.summary_path }} >> $GITHUB_STEP_SUMMARY

      - name: Fail if errors detected
        if: ${{ steps.run-check.outputs.exit_code != '' }}
        run: exit 1
