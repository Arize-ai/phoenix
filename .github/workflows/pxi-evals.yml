name: PXI Evals
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "evals/**"
      - "src/phoenix/server/agents/**"
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          regression = gated regression split (default, matches PR CI).
          full = full-collection run that prune-syncs the Phoenix dataset;
          run this against main after merge to drop removed examples.
        type: choice
        options:
          - regression
          - full
        default: regression

concurrency:
  group: pxi-evals-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  PHOENIX_COLLECTOR_ENDPOINT: ${{ secrets.PHOENIX_COLLECTOR_ENDPOINT }}
  PHOENIX_API_KEY: ${{ secrets.PHOENIX_API_KEY }}
  PXI_EVAL_INITIAL_RESULTS_PATH: ${{ github.workspace }}/pxi-eval-results-initial.json
  PXI_EVAL_RETRY_RESULTS_PATH: ${{ github.workspace }}/pxi-eval-results-retry.json
  PXI_EVAL_RETRY_NODEIDS_PATH: ${{ github.workspace }}/pxi-eval-retry-nodeids.txt

jobs:
  regression:
    name: PXI Regression Evals
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"
      - name: Set up `uv`
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.8"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Check Phoenix connectivity
        shell: bash
        run: |
          set -uo pipefail

          # Fail fast with a clear infra message if Phoenix is down, so a red
          # check reads as "collector unreachable" rather than a pile of agent
          # setup errors. Retry 3x/10s to ride out a transient blip.
          phoenix_url="${PHOENIX_COLLECTOR_ENDPOINT:-http://localhost:6006}"
          phoenix_url="${phoenix_url%/}"
          echo "Checking Phoenix connectivity at ${phoenix_url}..."
          reachable=0
          for attempt in 1 2 3; do
            if curl -sf --max-time 5 "${phoenix_url}/healthz" > /dev/null 2>&1; then
              echo "Phoenix reachable (attempt ${attempt})"
              reachable=1
              break
            fi
            if [[ "${attempt}" -lt 3 ]]; then
              echo "Phoenix not reachable (attempt ${attempt}/3), retrying in 10s..." >&2
              sleep 10
            fi
          done
          if [[ "${reachable}" -ne 1 ]]; then
            echo "::error::Phoenix unavailable at ${phoenix_url} after 3 attempts — aborting. Check PHOENIX_COLLECTOR_ENDPOINT."
            exit 1
          fi

          # healthz proves liveness but not auth: a wrong/rotated PHOENIX_API_KEY
          # would still go green here and record nothing. Hit an authenticated v1
          # endpoint and fail closed on any non-2xx so a bad key fails in seconds.
          auth_status="$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
            -H "Authorization: Bearer ${PHOENIX_API_KEY:-}" \
            "${phoenix_url}/v1/projects?limit=1")"
          if [[ "${auth_status}" =~ ^2 ]]; then
            echo "Phoenix API key accepted (GET /v1/projects -> ${auth_status})"
          else
            echo "::error::Phoenix rejected the API key (GET /v1/projects -> HTTP ${auth_status}). Check PHOENIX_API_KEY."
            exit 1
          fi
      - name: Run PXI eval suite
        id: initial
        shell: bash
        env:
          PXI_RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'regression' }}
          PXI_EVAL_RESULTS_PATH: ${{ env.PXI_EVAL_INITIAL_RESULTS_PATH }}
        run: |
          set -uo pipefail

          # Start from a clean artifact so the gate reads this run's results,
          # never a leftover from the workspace.
          rm -f \
            "${PXI_EVAL_INITIAL_RESULTS_PATH}" \
            "${PXI_EVAL_RETRY_RESULTS_PATH}" \
            "${PXI_EVAL_RETRY_NODEIDS_PATH}"

          # full collection (no -m) is the only mode that prune-syncs the
          # Phoenix dataset; -m regression matches the PR cost profile and
          # appends without pruning.
          set +e
          if [[ "${PXI_RUN_MODE}" == "full" ]]; then
            echo "Run mode: full collection — prune-syncs the Phoenix dataset (no split filter)."
            uv run pytest evals/pxi -c evals/pxi/pytest.ini -n auto
          else
            echo "Run mode: regression — gated regression split (append-sync only)."
            uv run pytest evals/pxi -c evals/pxi/pytest.ini -m regression -n auto
          fi
          pytest_rc=$?
          set -e
          echo "pytest exited ${pytest_rc} — the gate step decides the job, not this exit code."
      - name: Plan targeted behavioral retry
        id: retry_plan
        if: always()
        shell: bash
        run: |
          set -uo pipefail

          # Planning validates the initial artifact and emits only node IDs
          # carrying assessable misses in gating cells. An invalid run emits an
          # empty file and is classified by the final gate as unmeasurable.
          set +e
          uv run python -m evals.pxi.gate \
            "${PXI_EVAL_INITIAL_RESULTS_PATH}" \
            --thresholds evals/pxi/thresholds.yaml \
            --retry-nodeids-out "${PXI_EVAL_RETRY_NODEIDS_PATH}"
          plan_rc=$?
          set -e

          if [[ "${plan_rc}" -eq 0 && -s "${PXI_EVAL_RETRY_NODEIDS_PATH}" ]]; then
            echo "retry=true" >> "${GITHUB_OUTPUT}"
            echo "Targeted retry required for:"
            sed 's/^/  - /' "${PXI_EVAL_RETRY_NODEIDS_PATH}"
          else
            echo "retry=false" >> "${GITHUB_OUTPUT}"
            echo "No targeted behavioral retry will run (planning exit ${plan_rc})."
          fi
      - name: Retry initial behavioral misses
        if: always() && steps.retry_plan.outputs.retry == 'true'
        shell: bash
        env:
          PXI_EVAL_RESULTS_PATH: ${{ env.PXI_EVAL_RETRY_RESULTS_PATH }}
        run: |
          set -uo pipefail

          mapfile -t retry_nodeids < "${PXI_EVAL_RETRY_NODEIDS_PATH}"
          echo "Retrying ${#retry_nodeids[@]} failed pytest node ID(s) once."
          set +e
          uv run pytest \
            -c evals/pxi/pytest.ini \
            -n auto \
            "${retry_nodeids[@]}"
          pytest_rc=$?
          set -e
          echo "retry pytest exited ${pytest_rc} — the final gate reconciles both artifacts."
      - name: Gate results and render report
        if: always()
        shell: bash
        run: |
          set -uo pipefail

          initial_results="${PXI_EVAL_INITIAL_RESULTS_PATH}"
          retry_results="${PXI_EVAL_RETRY_RESULTS_PATH}"
          step_summary="${GITHUB_STEP_SUMMARY:-/dev/null}"
          report_dir="${RUNNER_TEMP}/pxi-eval-reports"
          mkdir -p "${report_dir}"
          report_md="${report_dir}/pxi-eval-summary.md"

          gate_args=(
            "${initial_results}"
            --thresholds evals/pxi/thresholds.yaml
            --report-out "${report_md}"
          )
          if [[ "${{ steps.retry_plan.outputs.retry }}" == "true" ]]; then
            gate_args+=(--retry-artifact "${retry_results}")
          fi

          # gate.py is the sole decider. Exit 1 requires the same assessable
          # evaluator miss on both attempts and a threshold breach. Exit 2 is
          # reserved for an unmeasurable run and never masquerades as regression.
          set +e
          gate_output="$(uv run python -m evals.pxi.gate "${gate_args[@]}" 2>&1)"
          gate_rc=$?
          set -e
          echo "${gate_output}"

          if [[ "${gate_rc}" -ne 0 ]]; then
            # Embed the report in the job log under ::stop-commands:: so a payload
            # line starting with '::' cannot close the group or spoof an
            # annotation while the report prints.
            stop_token="pxi-report-${GITHUB_RUN_ID}-${RANDOM}${RANDOM}"
            echo "::group::PXI EVAL REPORT (agent-readable)"
            echo "::stop-commands::${stop_token}"
            cat "${report_md}"
            echo "::${stop_token}::"
            echo "::endgroup::"
            # gate.py exits 2 when it could not measure a pass rate at all
            # (missing/invalid/partial artifact, dirty session, or recording not
            # bootstrapped) and 1 only when a pass rate was measured and breached
            # a threshold. Keep the two annotations distinct so a "couldn't
            # measure" run doesn't read as a regression to hunt for.
            if [[ "${gate_rc}" -eq 2 ]]; then
              echo "::error title=PXI eval unmeasurable::The PXI eval gate is unmeasurable (exit 2): an artifact was missing, invalid, partial, or a gating cell had zero assessable rows. This is not an agent regression. Expand 'PXI EVAL REPORT (agent-readable)' above, or fetch it with: gh run view ${GITHUB_RUN_ID} --log-failed"
            elif grep -q '^\*\*Result: TOO MANY FAILURES TO CONFIRM' "${report_md}"; then
              echo "::error title=PXI eval too many failures to confirm::Too many examples needed a retry to confirm individually, so the gate failed on attempt 1 alone without confirming any single example twice (exit 1). This is a real failure, but not a per-example confirmed regression. Expand 'PXI EVAL REPORT (agent-readable)' above, or fetch it with: gh run view ${GITHUB_RUN_ID} --log-failed"
            else
              echo "::error title=PXI confirmed regression::The same assessable evaluator failure occurred on both attempts and breached policy (exit 1). The digest names every example and links both Phoenix experiments. Expand 'PXI EVAL REPORT (agent-readable)' above, or fetch it with: gh run view ${GITHUB_RUN_ID} --log-failed"
            fi
          fi

          # Step summary (humans). GitHub caps the whole summary at 1 MiB; embed
          # the report when it fits, otherwise point at the uploaded artifact.
          summary_embed_budget=786432
          report_bytes="$(wc -c < "${report_md}")"
          {
            echo "## PXI Regression Evals"
            echo ""
            if [[ "${gate_rc}" -eq 0 ]]; then
              result_line="$(grep -m1 '^\*\*Result:' "${report_md}" || true)"
              echo "${result_line:-**Result: ✅ gate passed**}"
            elif [[ "${gate_rc}" -eq 2 ]]; then
              echo "**Result: ⚠️ gate unmeasurable (not a regression)**"
            elif grep -q '^\*\*Result: TOO MANY FAILURES TO CONFIRM' "${report_md}"; then
              echo "**Result: ❌ too many failures to confirm individually (not a per-example confirmed regression)**"
            else
              echo "**Result: ❌ confirmed regression**"
            fi
            echo ""
            if [[ "${report_bytes}" -lt "${summary_embed_budget}" ]]; then
              echo "<details><summary>PXI eval report (paste into a coding agent)</summary>"
              echo ""
              cat "${report_md}"
              echo ""
              echo "</details>"
            else
              echo "Report too large to embed — fetch it with" \
                "\`gh run download ${GITHUB_RUN_ID} -n pxi-eval-reports-${GITHUB_RUN_ID}\`."
            fi
          } >> "${step_summary}"

          exit "${gate_rc}"
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pxi-eval-reports-${{ github.run_id }}
          path: |
            ${{ env.PXI_EVAL_INITIAL_RESULTS_PATH }}
            ${{ env.PXI_EVAL_RETRY_RESULTS_PATH }}
            ${{ env.PXI_EVAL_RETRY_NODEIDS_PATH }}
            ${{ runner.temp }}/pxi-eval-reports/
          if-no-files-found: ignore
