name: Phoenix CLI Schema Check
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "js/packages/phoenix-cli/src/settings.ts"
      - "js/packages/phoenix-cli/scripts/build-schema.ts"
      - "schemas/phoenix-cli-settings.json"

concurrency:
  group: phoenix-cli-schema-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  schema-check:
    name: Phoenix CLI Schema Stale Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
      - name: Setup PNPM
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: js/package.json
      - name: Install Dependencies
        working-directory: ./js
        run: pnpm install --frozen-lockfile -r
      - name: Rebuild schema
        run: pnpm --filter @arizeai/phoenix-cli build:schema
      - name: Check schema is up to date
        run: git diff --exit-code schemas/phoenix-cli-settings.json
