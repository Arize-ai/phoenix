name: Publish Any Pull Request

# Publishes pre-release (alpha) builds of the Python packages to PyPI on every
# pull request, analogous to typescript-packages-publish-experimental.yml
# (which uses pkg-pr-new for npm).
#
# Builds are stamped with a PEP 440 alpha suffix (e.g. 17.10.0a<run_id>), so pip
# ignores them during normal resolution and installs them only when explicitly
# requested (--pre or an exact pinned version).
#
# Publishing uses PyPI Trusted Publishers (OIDC) — no API tokens. One-time setup
# per package on https://pypi.org:
#   - Add a Trusted Publisher: owner arize-ai, repo phoenix,
#     workflow python-packages-publish-experimental.yml,
#     environment pypi/<package-name> (e.g. pypi/arize-phoenix-client).
#   - Create the matching environment under repo Settings → Environments.
#
# TODO: Restrict to trusted PRs (e.g. require environment approval) before
#       relying on this for the production PyPI packages.

on:
  pull_request:

concurrency:
  group: pypi-publish-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      main: ${{ steps.filter.outputs.main }}
      phoenix-client: ${{ steps.filter.outputs.phoenix-client }}
      phoenix-evals: ${{ steps.filter.outputs.phoenix-evals }}
      phoenix-otel: ${{ steps.filter.outputs.phoenix-otel }}
      workflow_file: ${{ steps.filter.outputs.workflow_file }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            main:
              - 'src/phoenix/**'
              - 'app/src/**'
              - 'pyproject.toml'
            phoenix-client:
              - 'packages/phoenix-client/**'
            phoenix-evals:
              - 'packages/phoenix-evals/**'
            phoenix-otel:
              - 'packages/phoenix-otel/**'
            workflow_file:
              - '.github/workflows/python-packages-publish-experimental.yml'

  publish-main:
    name: Build and publish arize-phoenix (PyPI)
    needs: changes
    if: ${{ needs.changes.outputs.main == 'true' || needs.changes.outputs.workflow_file == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi/arize-phoenix
      url: https://pypi.org/p/arize-phoenix
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: app/package.json
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: 22
      - name: Build frontend
        working-directory: ./app
        run: pnpm install --frozen-lockfile && pnpm run build
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.10"
          version: "0.11.8"
          enable-cache: false
      - name: Stamp alpha version
        run: |
          python - <<'PY'
          import re, os
          path = "src/phoenix/version.py"
          run_id = os.environ["GITHUB_RUN_ID"]
          content = open(path).read()
          new = re.sub(
              r'(__version__ = ")([^"]+)(")',
              lambda m: f'{m.group(1)}{m.group(2)}a{run_id}{m.group(3)}',
              content,
          )
          open(path, "w").write(new)
          PY
      - name: Build distribution
        run: rm -rf dist && uv build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  publish-sub-packages:
    name: Build and publish ${{ matrix.package_name }} (PyPI)
    needs: changes
    if: ${{ needs.changes.outputs['phoenix-client'] == 'true' || needs.changes.outputs['phoenix-evals'] == 'true' || needs.changes.outputs['phoenix-otel'] == 'true' || needs.changes.outputs.workflow_file == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi/${{ matrix.package_name }}
      url: https://pypi.org/p/${{ matrix.package_name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/phoenix-client
            package_name: arize-phoenix-client
          - path: packages/phoenix-evals
            package_name: arize-phoenix-evals
          - path: packages/phoenix-otel
            package_name: arize-phoenix-otel
    steps:
      - name: Check if package needs publishing
        id: check
        env:
          CLIENT_CHANGED: ${{ needs.changes.outputs['phoenix-client'] }}
          EVALS_CHANGED: ${{ needs.changes.outputs['phoenix-evals'] }}
          OTEL_CHANGED: ${{ needs.changes.outputs['phoenix-otel'] }}
          WORKFLOW_CHANGED: ${{ needs.changes.outputs.workflow_file }}
          PACKAGE_NAME: ${{ matrix.package_name }}
        run: |
          case "$PACKAGE_NAME" in
            arize-phoenix-client) CHANGED="$CLIENT_CHANGED" ;;
            arize-phoenix-evals)  CHANGED="$EVALS_CHANGED" ;;
            arize-phoenix-otel)   CHANGED="$OTEL_CHANGED" ;;
            *)                    CHANGED="false" ;;
          esac
          if [ "$CHANGED" = "true" ] || [ "$WORKFLOW_CHANGED" = "true" ]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.needed == 'true'
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        if: steps.check.outputs.needed == 'true'
        with:
          python-version: "3.10"
          version: "0.11.8"
          enable-cache: false
      - name: Stamp alpha version
        if: steps.check.outputs.needed == 'true'
        env:
          PYPROJECT_PATH: ${{ matrix.path }}/pyproject.toml
        run: |
          python - <<'PY'
          import re, os
          path = os.environ["PYPROJECT_PATH"]
          run_id = os.environ["GITHUB_RUN_ID"]
          content = open(path).read()
          new = re.sub(
              r'(?m)^(version = ")([^"]+)(")',
              lambda m: f'{m.group(1)}{m.group(2)}a{run_id}{m.group(3)}',
              content,
          )
          open(path, "w").write(new)
          PY
      - name: Build distribution
        if: steps.check.outputs.needed == 'true'
        working-directory: ${{ matrix.path }}
        run: uv build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        if: steps.check.outputs.needed == 'true'

  comment:
    name: Post PyPI install instructions
    needs: [changes, publish-main, publish-sub-packages]
    if: |
      always() && (
        needs.publish-main.result == 'success' ||
        needs.publish-sub-packages.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            src/phoenix/version.py
            packages/phoenix-client/pyproject.toml
            packages/phoenix-evals/pyproject.toml
            packages/phoenix-otel/pyproject.toml
          sparse-checkout-cone-mode: false
      - name: Build comment body
        id: comment
        env:
          MAIN_RESULT: ${{ needs.publish-main.result }}
          PACKAGES_RESULT: ${{ needs.publish-sub-packages.result }}
          CLIENT_CHANGED: ${{ needs.changes.outputs['phoenix-client'] }}
          EVALS_CHANGED: ${{ needs.changes.outputs['phoenix-evals'] }}
          OTEL_CHANGED: ${{ needs.changes.outputs['phoenix-otel'] }}
          WORKFLOW_CHANGED: ${{ needs.changes.outputs.workflow_file }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import re, os

          run_id = os.environ["RUN_ID"]
          main_result = os.environ["MAIN_RESULT"]
          packages_result = os.environ["PACKAGES_RESULT"]
          client_changed = os.environ["CLIENT_CHANGED"] == "true"
          evals_changed = os.environ["EVALS_CHANGED"] == "true"
          otel_changed = os.environ["OTEL_CHANGED"] == "true"
          workflow_changed = os.environ["WORKFLOW_CHANGED"] == "true"

          def read_version(path, pattern):
              m = re.search(pattern, open(path).read())
              return m.group(1) if m else "unknown"

          lines = [
              "<!-- pypi-preview -->",
              "## PyPI Preview Packages",
              "",
              "Install the alpha build using pip (pinning the exact version installs the pre-release):",
              "",
          ]

          if main_result == "success":
              v = read_version("src/phoenix/version.py", r'__version__ = "([^"]+)"')
              lines += [
                  "**arize-phoenix**",
                  "```",
                  f"pip install arize-phoenix=={v}a{run_id}",
                  "```",
                  "",
              ]

          if packages_result == "success":
              if client_changed or workflow_changed:
                  v = read_version("packages/phoenix-client/pyproject.toml", r'(?m)^version = "([^"]+)"')
                  lines += [
                      "**arize-phoenix-client**",
                      "```",
                      f"pip install arize-phoenix-client=={v}a{run_id}",
                      "```",
                      "",
                  ]
              if evals_changed or workflow_changed:
                  v = read_version("packages/phoenix-evals/pyproject.toml", r'(?m)^version = "([^"]+)"')
                  lines += [
                      "**arize-phoenix-evals**",
                      "```",
                      f"pip install arize-phoenix-evals=={v}a{run_id}",
                      "```",
                      "",
                  ]
              if otel_changed or workflow_changed:
                  v = read_version("packages/phoenix-otel/pyproject.toml", r'(?m)^version = "([^"]+)"')
                  lines += [
                      "**arize-phoenix-otel**",
                      "```",
                      f"pip install arize-phoenix-otel=={v}a{run_id}",
                      "```",
                      "",
                  ]

          body = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"body<<GHADELIMITER\n{body}\nGHADELIMITER\n")
          PY
      - name: Find or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_BODY: ${{ steps.comment.outputs.body }}
        run: |
          MARKER="<!-- pypi-preview -->"
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -f body="$COMMENT_BODY"
          else
            gh pr comment "${PR_NUMBER}" --body "$COMMENT_BODY"
          fi
