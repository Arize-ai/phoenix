name: Weekly Docs Gap Audit

on:
  schedule:
    # Every Wednesday at 16:00 UTC (after release notes at 14:00 and llms.txt at 15:00)
    - cron: "0 16 * * 3"
  workflow_dispatch:

concurrency:
  group: docs-gap-audit
  cancel-in-progress: true

jobs:
  docs-gap-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required: claude-code-action requests a GitHub OIDC token at startup

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare scratch directory
        run: mkdir -p .scratch

      - name: Install subprocess isolation deps
        # Required by CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=1. The Claude CLI sandbox
        # needs both bubblewrap AND socat, and Ubuntu 24.04+ blocks the unprivileged
        # user namespaces it relies on by default. Mirrors the upstream action's
        # install step (which only runs when allowed_non_write_users is set).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap socat
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        env:
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Surface the full Claude SDK message stream in the step log instead of
          # the sanitized summary (denied-tool detail, tool calls, reasoning). Safe:
          # inputs are public repo/PR/issue content, registered secrets stay masked,
          # and the OIDC app token is never in Claude's context. Note: logs are public.
          show_full_output: 'true'
          prompt: |
            /phoenix-docs-gap-audit

            Audit the last 7 days of commits on origin/main for documentation gaps across
            /docs, package READMEs, package-level built-in docs (Sphinx, TypeDoc), Python
            docstrings, TSDoc, and code comments. Follow the skill's guidance strictly —
            fetch origin/main, grep-first search, breadth-first triage, ground every claim
            in real code.

            If there are no user-facing gaps (the audit window contains only dep bumps,
            internal refactors, or fully-documented features), write exactly `NO_CHANGES`
            as the first line of `.scratch/docs-gap-issue.md` and exit.

            Otherwise, write the full issue body markdown to `.scratch/docs-gap-issue.md`.
            The workflow will create a GitHub issue with:
              - Title: "docs: Weekly docs gap audit — <YYYY-MM-DD>" (today's UTC date)
              - Body: the full gap report markdown produced by the skill
              - Label: "documentation"

            Do not commit, push, open a PR, or create the issue yourself. The workflow
            handles publishing after you write the issue body file.
          claude_args: '--model claude-opus-4-8 --allowedTools Skill,Read,Glob,Grep,Agent,Write,"Bash(git fetch:*)","Bash(git log:*)","Bash(git diff:*)","Bash(git show:*)","Bash(date:*)","Bash(ls:*)","Bash(mkdir:*)"'

      - name: Create docs gap issue
        env:
          # Separate publishing token; the claude-code-action app token has
          # already been revoked by this point.
          GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
        run: |
          if [ ! -s .scratch/docs-gap-issue.md ]; then
            echo "No docs gap issue body written — exiting cleanly."
            exit 0
          fi
          if [ "$(head -n 1 .scratch/docs-gap-issue.md)" = "NO_CHANGES" ]; then
            echo "No docs gaps found — exiting cleanly."
            exit 0
          fi
          gh issue create \
            --title "docs: Weekly docs gap audit — $(date -u +%Y-%m-%d)" \
            --body-file .scratch/docs-gap-issue.md \
            --label "documentation"
