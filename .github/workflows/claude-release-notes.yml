name: Weekly Release Notes

on:
  schedule:
    # Every Wednesday at 14:00 UTC
    - cron: "0 14 * * 3"
  workflow_dispatch:

concurrency:
  group: release-notes
  cancel-in-progress: true

jobs:
  release-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # Required: claude-code-action requests a GitHub OIDC token at startup

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create branch
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="claude/release-notes-$DATE"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          mkdir -p .scratch

      - name: Install bubblewrap
        # Required by CLAUDE_CODE_SUBPROCESS_ENV_SCRUB=1 for subprocess isolation.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1.0.133
        env:
          CLAUDE_CODE_SUBPROCESS_ENV_SCRUB: "1"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Setting additional_permissions triggers the action to explicitly request
          # contents/pull_requests/issues: write on the OIDC-minted app token, which
          # the post-action "Commit and open pull request" step uses to git push and
          # open the PR via steps.claude.outputs.github_token.
          additional_permissions: |
            contents: write
          prompt: |
            /phoenix-release-notes

            If there are no undocumented releases with user-facing changes, exit without making changes.

            When done, write a PR body to `.scratch/pr-body.md`. Do not commit,
            push, or open a PR; the workflow handles publishing.
            The workflow will open a PR titled "docs: Add Phoenix release notes".
          claude_args: '--model claude-opus-4-7 --allowedTools Skill,Read,Write,Edit,Glob,Grep,Agent,"Bash(git fetch:*)","Bash(git log:*)","Bash(git diff:*)","Bash(git show:*)","Bash(mkdir:*)","Bash(ls:*)","Bash(date:*)"'

      - name: Commit and open pull request
        if: steps.claude.outcome == 'success'
        env:
          # App token minted by the claude-code-action OIDC exchange — short-lived,
          # auto-revoked at job end, and (unlike GITHUB_TOKEN) triggers downstream CI.
          GH_TOKEN: ${{ steps.claude.outputs.github_token }}
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No release notes changes — exiting cleanly."
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          blocked_files=$(git diff --name-only | awk '
            /^\.github\// ||
            /^\.cursor\// ||
            /^\.claude\// ||
            /^\.agents\// ||
            /(^|\/)AGENTS\.md$/ ||
            /(^|\/)CLAUDE\.md$/
          ')
          if [ -n "$blocked_files" ]; then
            echo "::warning::Release notes audit changed automation or agent-instruction files; restoring them from origin/main."
            printf '%s\n' "$blocked_files"
            while IFS= read -r file; do
              if git cat-file -e "origin/main:$file" 2>/dev/null; then
                git restore --source=origin/main --worktree --staged -- "$file"
              else
                git restore --staged -- "$file" 2>/dev/null || true
                rm -f -- "$file"
              fi
            done <<< "$blocked_files"
          fi
          git add -A
          git commit -m "docs: add Phoenix release notes"
          git push -u origin "$BRANCH"
          if [ -s .scratch/pr-body.md ]; then
            BODY_FILE=.scratch/pr-body.md
          else
            BODY_FILE=$(mktemp)
            echo "Automated weekly release notes update." > "$BODY_FILE"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "docs: Add Phoenix release notes — $TODAY" \
            --body-file "$BODY_FILE"
