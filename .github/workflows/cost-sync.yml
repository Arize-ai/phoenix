name: Sync Model Pricing Data

permissions:
  contents: write
  pull-requests: write

env:
  ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

on:
  schedule:
    - cron: "0 13 * * 1-5"  # every weekday morning

jobs:
  sync-model-pricing:
    name: Sync Model Pricing Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.10.9"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync model cost manifest with LiteLLM
        run: make sync-models

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --exit-code src/phoenix/server/cost_tracking/model_cost_manifest.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ADDED=$(git diff src/phoenix/server/cost_tracking/model_cost_manifest.json | grep -c '^+' || true)
            REMOVED=$(git diff src/phoenix/server/cost_tracking/model_cost_manifest.json | grep -c '^-' || true)
            echo "lines_added=$ADDED" >> $GITHUB_OUTPUT
            echo "lines_removed=$REMOVED" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate timestamp
        id: timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d-%H-%M-%S")
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          commit-message: "fix(cost): update built-in model token prices"
          title: "fix(cost): update built-in model token prices"
          body: |
            This change was automatically generated by the sync-model-pricing workflow.
          branch: update-model-pricing-${{ steps.timestamp.outputs.timestamp }}
          base: main
          delete-branch: true

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [sync-model-pricing]
    if: always()
    steps:
      - name: Notify success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Model pricing sync succeeded\n${{ env.ACTIONS_RUN_URL }}"
            }
      - name: Notify failure
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨🚨🚨 MODEL PRICING SYNC FAILED 🚨🚨🚨\n${{ env.ACTIONS_RUN_URL }}"
            }
