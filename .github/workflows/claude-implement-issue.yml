name: Claude Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    # Only run when good-agent-issue label is added
    if: github.event.label.name == 'good-agent-issue'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Check sender permissions
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission" -q '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "maintain" && "$PERMISSION" != "write" ]]; then
            echo "Sender ${{ github.event.sender.login }} has '$PERMISSION' permission, skipping"
            exit 0
          fi
          echo "AUTHORIZED=true" >> "$GITHUB_ENV"

      - name: Check if already in progress
        if: env.AUTHORIZED == 'true'
        run: |
          # Skip if already assigned
          ASSIGNEES=$(gh issue view "$ISSUE_NUMBER" --json assignees -q '.assignees | length')
          if [ "$ASSIGNEES" -gt 0 ]; then
            echo "Issue already assigned, skipping"
            exit 0
          fi

          # Skip if there's already a PR for this issue
          LINKED_PRS=$(gh pr list --search "issue:$ISSUE_NUMBER" --json number -q 'length')
          if [ "$LINKED_PRS" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          echo "READY=true" >> "$GITHUB_ENV"

      - name: Claim issue
        if: env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-assignee "github-actions[bot]" --add-label "agent-in-progress"

      - name: Checkout repository
        if: env.READY == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create branch
        if: env.READY == 'true'
        run: |
          BRANCH="claude/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Run Claude Code
        if: env.READY == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read and implement GitHub issue #${{ github.event.issue.number }}.

            ${{ github.event.issue.body }}

            Create commits referencing #${{ github.event.issue.number }}, then push and open a PR with `gh pr create`.
          claude_args: '--max-turns 30'

      - name: Cleanup
        if: always() && env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-assignee "github-actions[bot]" --remove-label "agent-in-progress"
          if [ "${{ job.status }}" = "failure" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Agent implementation failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
