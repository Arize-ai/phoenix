name: Claude Implement Issue

on:
  issues:
    types: [labeled]

jobs:
  implement:
    # Only run when good-agent-issue label is added
    if: github.event.label.name == 'good-agent-issue'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Check sender permissions
        run: |
          PERMISSION=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission" -q '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "maintain" && "$PERMISSION" != "write" ]]; then
            echo "Sender ${{ github.event.sender.login }} has '$PERMISSION' permission, skipping"
            exit 0
          fi
          echo "AUTHORIZED=true" >> "$GITHUB_ENV"

      - name: Check if already in progress
        if: env.AUTHORIZED == 'true'
        run: |
          # Skip if already assigned
          ASSIGNEES=$(gh issue view "$ISSUE_NUMBER" --json assignees -q '.assignees | length')
          if [ "$ASSIGNEES" -gt 0 ]; then
            echo "Issue already assigned, skipping"
            exit 0
          fi

          # Skip if there's already a PR for this issue
          LINKED_PRS=$(gh pr list --search "issue:$ISSUE_NUMBER" --json number -q 'length')
          if [ "$LINKED_PRS" -gt 0 ]; then
            echo "PR already exists, skipping"
            exit 0
          fi

          echo "READY=true" >> "$GITHUB_ENV"

      - name: Claim issue
        if: env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "agent-in-progress"

      - name: Checkout repository
        if: env.READY == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create branch
        if: env.READY == 'true'
        run: |
          BRANCH="claude/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Run Claude Code
        if: env.READY == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          prompt: |
            Implement GitHub issue #${{ github.event.issue.number }} end-to-end. Deliver a complete, merge-ready PR.

            ## 1. Understand
            - Run `gh issue view ${{ github.event.issue.number }}` to read the issue and comments.
            - Read CLAUDE.md and run `make help` to learn the project tooling.
            - Explore relevant code, patterns, and conventions before writing anything.

            ## 2. Implement
            - Follow existing codebase patterns and conventions.
            - Add clear docstrings to new public functions, classes, and modules.
            - Keep changes focused on the issue.
            - If you modify any JS/TS packages under `js/`, create a changeset via `pnpm changeset`.

            ## 3. Validate
            - Run /simplify and fix any issues.
            - Run tests, linting, and formatting via `make` targets. Fix failures.
            - Update docs and skills/ files if affected by your changes. Ground documentation in real code — verify examples and references against the actual implementation.

            ## 4. Ship
            - Commit referencing #${{ github.event.issue.number }}, push, and open a PR via `gh pr create`.
            - Write a clear PR description covering what, why, and how to verify.
            - Include screenshots or examples when applicable.

            ## Acceptance Criteria
            Complete every item before opening the PR:
            - [ ] Plan out the feature end-to-end
            - [ ] Review the code and run /simplify
            - [ ] Make sure tests pass and validate the change
            - [ ] Add clear docstrings
            - [ ] Update necessary documentation (grounded in real code, not hallucinated)
            - [ ] Create a changeset (`pnpm changeset`) if JS/TS packages were modified
            - [ ] Update relevant skills under the main skills/ directory
            - [ ] Make sure linting and formatting is correct
            - [ ] Create the PR with a clear description
            - [ ] Provide screenshots or examples when applicable to prove that it works as expected
          claude_args: '--allowedTools Read,Write,Edit,Glob,Grep,Agent,"Bash(git:*)","Bash(make:*)","Bash(gh:*)","Bash(uv:*)","Bash(pnpm:*)"'

      - name: Cleanup
        if: always() && env.READY == 'true'
        run: |
          gh issue edit "$ISSUE_NUMBER" --remove-assignee "github-actions[bot]" --remove-label "agent-in-progress"
          if [ "${{ job.status }}" = "failure" ]; then
            gh issue comment "$ISSUE_NUMBER" --body "Agent implementation failed. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi
