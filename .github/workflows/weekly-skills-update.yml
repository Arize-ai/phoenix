name: Weekly Skills Update

permissions:
  contents: read

on:
  schedule:
    # Every Monday at 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch:

concurrency:
  group: update-skills
  cancel-in-progress: true

jobs:
  update-skills:
    name: Weekly Skills Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Update skills from skills-lock.json
        run: npx --yes skills update --project -y

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date -u +%Y-%m-%d-%H-%M-%S)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          commit-message: "chore(skills): update external skills"
          title: "chore(skills): update external skills"
          body: |
            Automated update of external skills tracked in `skills-lock.json` via
            `npx skills update --project`.

            Review the diff to confirm the upstream changes look reasonable before merging.
          branch: update-skills-${{ steps.timestamp.outputs.timestamp }}
          base: main
          delete-branch: true
          labels: documentation
          add-paths: |
            .agents/skills/**
            .claude/skills/**
            skills-lock.json
