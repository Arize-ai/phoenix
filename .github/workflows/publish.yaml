on:
  workflow_dispatch:
    inputs:
      feature_branch:
        description: >-
          Publish a SHA-based dev preview from this branch instead of running
          the release flow. Leave empty to run the normal production release.
        required: false
        type: string
        default: ""

name: Publish Python packages

# This workflow has two modes, both dispatched manually:
#   - Release (feature_branch empty): the production flow — build from
#     release-please tags and publish final versions to PyPI.
#   - Preview (feature_branch set): publish PEP 440 development (dev) pre-releases
#     for the packages changed on that branch (relative to main). Dev builds are
#     stamped from the branch head commit SHA (<version>.dev<int(sha[:7], 16)>), so
#     each commit maps to one deterministic version and pip ignores them unless
#     explicitly requested (--pre or an exact pinned version).
#
# Both modes publish through the SAME PyPI Trusted Publishers — this workflow
# file plus the `pypi` (arize-phoenix) and `pypi/<package>` environments — so
# previews need no extra PyPI or GitHub environment configuration.

concurrency:
  group: ${{ github.workflow }}-${{ inputs.feature_branch || github.run_id }}
  cancel-in-progress: ${{ inputs.feature_branch != '' }}

permissions:
  contents: read

jobs:
  list-python-packages:
    name: List Python packages from manifest
    if: ${{ inputs.feature_branch == '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      phoenix_path: ${{ steps.paths.outputs.phoenix_path }}
      package_paths: ${{ steps.paths.outputs.package_paths }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .release-please-manifest.json
            release-please-config.json
          sparse-checkout-cone-mode: false
      - name: Get paths not yet on PyPI
        id: paths
        run: |
          NEED_PHOENIX=''
          NEED_PACKAGES='[]'
          for path in $(jq -r 'keys[]' .release-please-manifest.json); do
            [ -z "$path" ] && continue
            NAME=$(jq -r --arg p "$path" '.packages[$p]["package-name"] // empty' release-please-config.json)
            VERSION=$(jq -r --arg p "$path" '.[$p]' .release-please-manifest.json)
            if [ -z "$NAME" ] || [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
              echo "Including $path (name or version missing)"
              if [ "$path" = "." ]; then NEED_PHOENIX='.'; else NEED_PACKAGES=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PACKAGES"); fi
              continue
            fi
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${NAME}/${VERSION}/json")
            if [ "$HTTP" != "200" ]; then
              echo "${NAME}==${VERSION} not on PyPI (HTTP ${HTTP}), will publish"
              if [ "$path" = "." ]; then
                NEED_PHOENIX='.'
              else
                NEED_PACKAGES=$(jq -c --arg p "$path" '. + [$p]' <<< "$NEED_PACKAGES")
              fi
            else
              echo "${NAME}==${VERSION} already on PyPI, skipping"
            fi
          done
          echo "phoenix_path=$NEED_PHOENIX" >> $GITHUB_OUTPUT
          echo "package_paths=$NEED_PACKAGES" >> $GITHUB_OUTPUT
          echo "Phoenix path: $NEED_PHOENIX"
          echo "Package paths: $NEED_PACKAGES"

  build-phoenix:
    name: Build Phoenix (main package)
    runs-on: ubuntu-latest
    needs: list-python-packages
    if: needs.list-python-packages.outputs.phoenix_path == '.'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Read version from manifest
        id: version
        run: |
          v=$(jq -r '.["."] // empty' .release-please-manifest.json)
          if [ -z "$v" ]; then echo "::error::No version for root (.) in manifest"; exit 1; fi
          echo "version=$v" >> $GITHUB_OUTPUT
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: refs/tags/arize-phoenix-v${{ steps.version.outputs.version }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: app/package.json
      - name: Build frontend
        working-directory: ./app
        run: pnpm install --frozen-lockfile && pnpm run build
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.10"
          version: "0.11.12"
      - name: Build distribution
        run: rm -rf dist && uv build
      - name: Verify bundled UI assets in wheel
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          import sys

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              print("No wheel found in dist/")
              sys.exit(1)
          wheel = wheels[0]
          with ZipFile(wheel) as zf:
              names = set(zf.namelist())

          has_manifest = "phoenix/server/static/.vite/manifest.json" in names
          has_js_asset = any(
              name.startswith("phoenix/server/static/assets/") and name.endswith(".js")
              for name in names
          )
          if not has_manifest or not has_js_asset:
              print(f"Wheel missing required frontend bundle files: {wheel}")
              print(f"  has manifest: {has_manifest}")
              print(f"  has js asset: {has_js_asset}")
              sys.exit(1)
          print(f"Verified bundled UI assets in {wheel.name}")
          PY
      - name: Check wheel contents
        run: uv run --with check-wheel-contents check-wheel-contents --ignore W004 dist/*.whl
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phoenix-dist
          path: dist/

  publish-phoenix:
    name: Publish Phoenix (main package)
    runs-on: ubuntu-latest
    needs: build-phoenix
    environment:
      name: pypi
      url: https://pypi.org/p/arize-phoenix
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: phoenix-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  build-packages:
    name: Build Python packages
    runs-on: ubuntu-latest
    needs: list-python-packages
    if: needs.list-python-packages.outputs.package_paths != '[]'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/phoenix-client
            package_name: arize-phoenix-client
          - path: packages/phoenix-evals
            package_name: arize-phoenix-evals
          - path: packages/phoenix-otel
            package_name: arize-phoenix-otel
    steps:
      - name: Check if package needs building
        id: check
        env:
          PACKAGE_PATHS: ${{ needs.list-python-packages.outputs.package_paths }}
          MATRIX_PATH: ${{ matrix.path }}
        run: |
          if echo "$PACKAGE_PATHS" | jq -e --arg p "$MATRIX_PATH" 'index($p)' > /dev/null 2>&1; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "Skipping $MATRIX_PATH — already on PyPI"
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.needed == 'true'
        with:
          persist-credentials: false
      - name: Resolve ref from manifest
        if: steps.check.outputs.needed == 'true'
        id: ref
        run: |
          VERSION=$(jq -r --arg p "${{ matrix.path }}" '.[$p] // empty' .release-please-manifest.json)
          NAME=$(jq -r --arg p "${{ matrix.path }}" '.packages[$p]["package-name"] // empty' release-please-config.json)
          if [ -z "$VERSION" ] || [ -z "$NAME" ]; then
            echo "::error::Missing version or package-name for path ${{ matrix.path }}"
            exit 1
          fi
          echo "ref=refs/tags/${NAME}-v${VERSION}" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.needed == 'true'
        with:
          persist-credentials: false
          ref: ${{ steps.ref.outputs.ref }}
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        if: steps.check.outputs.needed == 'true'
        with:
          python-version: "3.10"
          version: "0.11.12"
      - run: uv build
        if: steps.check.outputs.needed == 'true'
        working-directory: ${{ matrix.path }}
      - run: uv run --with check-wheel-contents check-wheel-contents dist/*.whl
        if: steps.check.outputs.needed == 'true'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.check.outputs.needed == 'true'
        with:
          name: ${{ matrix.package_name }}-dist
          path: dist/

  publish-packages:
    name: Publish Python packages
    runs-on: ubuntu-latest
    needs: [list-python-packages, build-packages]
    if: needs.build-packages.result == 'success'
    environment:
      name: ${{ matrix.environment_name }}
      url: https://pypi.org/p/${{ matrix.package_name }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/phoenix-client
            package_name: arize-phoenix-client
            environment_name: pypi/arize-phoenix-client
          - path: packages/phoenix-evals
            package_name: arize-phoenix-evals
            environment_name: pypi/arize-phoenix-evals
          - path: packages/phoenix-otel
            package_name: arize-phoenix-otel
            environment_name: pypi/arize-phoenix-otel
    steps:
      - name: Check if package needs publishing
        id: check
        env:
          PACKAGE_PATHS: ${{ needs.list-python-packages.outputs.package_paths }}
          MATRIX_PATH: ${{ matrix.path }}
        run: |
          if echo "$PACKAGE_PATHS" | jq -e --arg p "$MATRIX_PATH" 'index($p)' > /dev/null 2>&1; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        if: steps.check.outputs.needed == 'true'
        with:
          name: ${{ matrix.package_name }}-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        if: steps.check.outputs.needed == 'true'

  # arize-phoenix-sqlean is a vendored C extension (fork of nalgeon/sqlean.py),
  # so it cannot go through the pure-Python `uv build` matrix above: wheels are
  # compiled per platform and interpreter with cibuildwheel. Source preparation
  # (downloading the SQLite amalgamation and sqlean extension sources that the
  # sdist bundles) runs once on Ubuntu and is handed to the build legs as an
  # artifact, because the Makefile needs make/curl/unzip, which the Windows
  # runner does not provide.
  sqlean-sources:
    name: Prepare arize-phoenix-sqlean sources
    runs-on: ubuntu-latest
    needs: list-python-packages
    if: contains(fromJSON(needs.list-python-packages.outputs.package_paths), 'packages/phoenix-sqlean')
    permissions:
      contents: read
    outputs:
      needed: ${{ steps.ref.outputs.needed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Resolve ref from manifest
        id: ref
        run: |
          VERSION=$(jq -r '.["packages/phoenix-sqlean"] // empty' .release-please-manifest.json)
          if [ -z "$VERSION" ]; then
            echo "::error::Missing version for packages/phoenix-sqlean in manifest"
            exit 1
          fi
          TAG="arize-phoenix-sqlean-v${VERSION}"
          # Until release-please creates the first release of this package, the
          # manifest version has no tag — skip instead of failing the run.
          if git ls-remote --exit-code origin "refs/tags/${TAG}" > /dev/null 2>&1; then
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "ref=refs/tags/${TAG}" >> $GITHUB_OUTPUT
          else
            echo "Tag ${TAG} does not exist yet; skipping arize-phoenix-sqlean"
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.ref.outputs.needed == 'true'
        with:
          persist-credentials: false
          ref: ${{ steps.ref.outputs.ref }}
      - name: Download SQLite and sqlean extension sources
        if: steps.ref.outputs.needed == 'true'
        working-directory: packages/phoenix-sqlean
        run: make prepare-src download-sqlite download-sqlean
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.ref.outputs.needed == 'true'
        with:
          name: arize-phoenix-sqlean-sources
          path: packages/phoenix-sqlean

  build-sqlean:
    name: Build arize-phoenix-sqlean (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: sqlean-sources
    if: needs.sqlean-sources.result == 'success' && needs.sqlean-sources.outputs.needed == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: arize-phoenix-sqlean-sources
          path: pkg
      - name: Set up QEMU for aarch64 wheels
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64
      - name: Build wheels
        uses: pypa/cibuildwheel@9c00cb4f6b517705a3794b22395aedc36257242c # v3.2.1
        with:
          package-dir: pkg
        env:
          CIBW_ARCHS_LINUX: x86_64 aarch64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_ARCHS_WINDOWS: AMD64
          CIBW_BUILD: "cp310-macosx* cp311-macosx* cp312-macosx* cp313-macosx* cp314-macosx* cp310-manylinux* cp311-manylinux* cp312-manylinux* cp313-manylinux* cp314-manylinux* cp310-win* cp311-win* cp312-win* cp313-win* cp314-win*"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
      - name: Build sdist
        if: runner.os == 'Linux'
        run: pipx run build --sdist --outdir wheelhouse pkg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: arize-phoenix-sqlean-dist-${{ matrix.os }}
          path: wheelhouse/

  publish-sqlean:
    name: Publish arize-phoenix-sqlean
    runs-on: ubuntu-latest
    needs: build-sqlean
    if: needs.build-sqlean.result == 'success'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: arize-phoenix-sqlean-dist-*
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  trigger-version-updates:
    name: Trigger dependency updates
    runs-on: ubuntu-latest
    needs: [list-python-packages, publish-packages]
    if: needs.publish-packages.result == 'success'
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/phoenix-client
            package_name: arize-phoenix-client
          - path: packages/phoenix-evals
            package_name: arize-phoenix-evals
          - path: packages/phoenix-otel
            package_name: arize-phoenix-otel
    steps:
      - name: Check if package was published
        id: check
        env:
          PACKAGE_PATHS: ${{ needs.list-python-packages.outputs.package_paths }}
          MATRIX_PATH: ${{ matrix.path }}
        run: |
          if echo "$PACKAGE_PATHS" | jq -e --arg p "$MATRIX_PATH" 'index($p)' > /dev/null 2>&1; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.needed == 'true'
        with:
          persist-credentials: false
          sparse-checkout: .release-please-manifest.json
          sparse-checkout-cone-mode: false
      - name: Trigger dependency update workflow
        if: steps.check.outputs.needed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r --arg p "${{ matrix.path }}" '.[$p] // empty' .release-please-manifest.json)
          gh workflow run update-phoenix-package-versions.yml \
            --repo "$GITHUB_REPOSITORY" \
            --field package="${{ matrix.package_name }}" \
            --field version="$VERSION"

  slack:
    name: Slack notification
    needs: [list-python-packages, publish-phoenix, publish-packages, publish-sqlean, trigger-version-updates]
    if: always() && inputs.feature_branch == '' && (needs.publish-phoenix.result != 'skipped' || needs.publish-packages.result != 'skipped' || needs.publish-sqlean.result != 'skipped')
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Set notification content
        id: notify
        env:
          PHOENIX_RESULT: ${{ needs.publish-phoenix.result }}
          PACKAGES_RESULT: ${{ needs.publish-packages.result }}
          SQLEAN_RESULT: ${{ needs.publish-sqlean.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$PHOENIX_RESULT" = "failure" ] || [ "$PACKAGES_RESULT" = "failure" ] || [ "$SQLEAN_RESULT" = "failure" ]; then
            {
              echo "text<<EOF"
              echo "🚨🚨🚨 PYPI Publication Failed 🚨🚨🚨"
              echo "$RUN_URL"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          elif [ "$PHOENIX_RESULT" = "success" ] || [ "$PACKAGES_RESULT" = "success" ] || [ "$SQLEAN_RESULT" = "success" ]; then
            {
              echo "text<<EOF"
              echo "PYPI Publication Succeeded"
              echo "$RUN_URL"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi
      - name: Send message to Slack
        if: steps.notify.outputs.text != ''
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "type": "mrkdwn",
              "text": ${{ toJSON(steps.notify.outputs.text) }}
            }

  # ---------------------------------------------------------------------------
  # Feature-branch preview flow — runs only when `feature_branch` is set. Builds
  # dev pre-releases for the packages changed on that branch (vs main), stamped
  # from the branch head SHA, and publishes via the same Trusted Publishers.
  # ---------------------------------------------------------------------------

  preview-changes:
    name: Detect changed packages (preview)
    if: ${{ inputs.feature_branch != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      main: ${{ steps.filter.outputs.main }}
      phoenix-client: ${{ steps.filter.outputs.phoenix-client }}
      phoenix-evals: ${{ steps.filter.outputs.phoenix-evals }}
      phoenix-otel: ${{ steps.filter.outputs.phoenix-otel }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.feature_branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve branch head SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: main
          # Diff against the dispatched feature branch, not the branch the
          # workflow file was dispatched from (which is what paths-filter uses
          # by default when `ref` is omitted).
          ref: ${{ inputs.feature_branch }}
          filters: |
            main:
              - 'src/phoenix/**'
              - 'app/src/**'
              - 'pyproject.toml'
            phoenix-client:
              - 'packages/phoenix-client/**'
            phoenix-evals:
              - 'packages/phoenix-evals/**'
            phoenix-otel:
              - 'packages/phoenix-otel/**'

  preview-phoenix:
    name: Preview publish arize-phoenix (PyPI dev)
    needs: preview-changes
    if: ${{ needs.preview-changes.outputs.main == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/arize-phoenix
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Pin to the exact commit detected by preview-changes so the build and
          # the version suffix always refer to the same SHA, even if the branch
          # advances mid-run.
          ref: ${{ needs.preview-changes.outputs.sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          package_json_file: app/package.json
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: 22
      - name: Build frontend
        working-directory: ./app
        run: pnpm install --frozen-lockfile && pnpm run build
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.10"
          version: "0.11.12"
          enable-cache: false
      - name: Stamp dev version
        env:
          HEAD_SHA: ${{ needs.preview-changes.outputs.sha }}
        run: |
          python - <<'PY'
          import re, os
          path = "src/phoenix/version.py"
          suffix = int(os.environ["HEAD_SHA"][:7], 16)
          content = open(path).read()
          new = re.sub(
              r'(__version__ = ")([^"]+)(")',
              lambda m: f'{m.group(1)}{m.group(2)}.dev{suffix}{m.group(3)}',
              content,
          )
          open(path, "w").write(new)
          PY
      - name: Build distribution
        run: rm -rf dist && uv build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true

  preview-packages:
    name: Preview publish ${{ matrix.package_name }} (PyPI dev)
    needs: preview-changes
    if: ${{ needs.preview-changes.outputs['phoenix-client'] == 'true' || needs.preview-changes.outputs['phoenix-evals'] == 'true' || needs.preview-changes.outputs['phoenix-otel'] == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ matrix.environment_name }}
      url: https://pypi.org/p/${{ matrix.package_name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: packages/phoenix-client
            package_name: arize-phoenix-client
            environment_name: pypi/arize-phoenix-client
            changed_output: phoenix-client
          - path: packages/phoenix-evals
            package_name: arize-phoenix-evals
            environment_name: pypi/arize-phoenix-evals
            changed_output: phoenix-evals
          - path: packages/phoenix-otel
            package_name: arize-phoenix-otel
            environment_name: pypi/arize-phoenix-otel
            changed_output: phoenix-otel
    steps:
      - name: Check if package changed
        id: check
        env:
          CHANGED: ${{ needs.preview-changes.outputs[matrix.changed_output] }}
        run: |
          if [ "$CHANGED" = "true" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check.outputs.needed == 'true'
        with:
          # Pin to the exact commit detected by preview-changes (see preview-phoenix).
          ref: ${{ needs.preview-changes.outputs.sha }}
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        if: steps.check.outputs.needed == 'true'
        with:
          python-version: "3.10"
          version: "0.11.12"
          enable-cache: false
      - name: Stamp dev version
        if: steps.check.outputs.needed == 'true'
        env:
          PYPROJECT_PATH: ${{ matrix.path }}/pyproject.toml
          HEAD_SHA: ${{ needs.preview-changes.outputs.sha }}
        run: |
          python - <<'PY'
          import re, os
          path = os.environ["PYPROJECT_PATH"]
          suffix = int(os.environ["HEAD_SHA"][:7], 16)
          content = open(path).read()
          new = re.sub(
              r'(?m)^(version = ")([^"]+)(")',
              lambda m: f'{m.group(1)}{m.group(2)}.dev{suffix}{m.group(3)}',
              content,
          )
          open(path, "w").write(new)
          PY
      - name: Build distribution
        if: steps.check.outputs.needed == 'true'
        working-directory: ${{ matrix.path }}
        run: uv build
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        if: steps.check.outputs.needed == 'true'
        with:
          skip-existing: true
