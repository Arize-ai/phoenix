# Phoenix eval CI recipe (pytest).
#
# Copy this file to .github/workflows/eval-ci.yml in your repository.
# It installs the Phoenix pytest plugin, runs your marked eval suite, and gates
# the job on pytest's exit code. The plugin records each marked test as a run in
# a Phoenix experiment and prints a per-experiment summary to the terminal at the
# end of the run.
#
# The only contracts this recipe relies on are pytest's exit code and the
# terminal summary it prints. Both are stable across plugin versions.

name: eval-ci

on:
  pull_request:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The pytest extra activates the pytest11 plugin entry point. Add
      # arize-phoenix-evals if your tests use @pytest.mark.phoenix(evaluators=...)
      # or px.evaluate(...).
      - name: Install dependencies
        run: pip install "arize-phoenix-client[pytest]" pytest

      - name: Run eval suite
        env:
          # Where the plugin sends experiment runs.
          PHOENIX_COLLECTOR_ENDPOINT: ${{ secrets.PHOENIX_COLLECTOR_ENDPOINT }}
          PHOENIX_API_KEY: ${{ secrets.PHOENIX_API_KEY }}
        # The job fails when any marked test fails (pytest's nonzero exit).
        run: pytest tests/evals

