[pytest]
# Self-contained config for the MCP benchmark. `pytest -c <file>` REPLACES the
# root config rather than inheriting it, so everything the benchmark needs is
# declared here -- and the root's --doctest-modules/--new-first/--showlocals are
# absent by omission, not subtraction. With -c, pytest's rootdir is this file's
# directory, so testpaths is relative to evals/mcp.
testpaths = tests
# no:randomly keeps questions in their declared order: runs are strictly
# sequential by design (wall clock is a measured quantity), so shuffling adds
# noise without adding coverage.
addopts = --import-mode=importlib -p no:randomly
asyncio_mode = auto
# The session-scoped fixtures (ground truth over httpx, catalog probe over MCP)
# and the async tests share one session loop, so an MCP client entered by a
# fixture is usable from every test without cross-loop cancel-scope errors.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    phoenix: record this test as a Phoenix experiment run (phoenix-client plugin).
