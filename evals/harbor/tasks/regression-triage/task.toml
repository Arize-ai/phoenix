schema_version = "1.3"
multi_step_reward_strategy = "mean"

[task]
name = "arize/phoenix-regression-triage"
description = "Phoenix ServerAgent triages an experiment regression via GraphQL"
keywords = ["phoenix", "agent", "graphql", "regression"]

[environment]
os = "linux"
cpus = 2
memory_mb = 4096
network_mode = "public"
build_timeout_sec = 1200.0
env = { ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}", HARBOR_PHOENIX_COLLECTOR_ENDPOINT = "${HARBOR_PHOENIX_COLLECTOR_ENDPOINT:-}", HARBOR_PHOENIX_API_KEY = "${HARBOR_PHOENIX_API_KEY:-}", HARBOR_PHOENIX_PROJECT_NAME = "${HARBOR_PHOENIX_PROJECT_NAME:-harbor-server-agent-evals}" }

[[steps]]
name = "01-aggregate"
min_reward = 1.0
[steps.agent]
timeout_sec = 900.0
[steps.verifier]
timeout_sec = 120.0

[[steps]]
name = "02-diagnose"
[steps.agent]
timeout_sec = 900.0

[[steps]]
name = "03-trace-drilldown"
[steps.agent]
timeout_sec = 900.0

[[steps]]
name = "04-create-split"
[steps.agent]
timeout_sec = 900.0
