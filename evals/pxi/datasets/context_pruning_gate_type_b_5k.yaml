dataset_name: context_pruning_gate_type_b_5k
description: 'Admission gate: Type B tasks at the 5K recalled-history depth.'
evaluators:
- correct_tools_called
- tool_call_args_match
- tool_call_count_within_limit
examples:
- id: gate-type-b-5k-01-filter-tool_result-p10-5000
  splits:
  - dev
  input:
    context_pruning_prefix:
      seed: 20260703
      depth_tokens: 5000
      composition: fallback-60-tool-25-assistant-15-user
      needle: attributes['experiment.cohort'] == 'cohort-filter-tool-result-p10-01'
      carrier: tool_result
      position: p10
      archetype: filter
    messages:
    - role: user
      content: Use the earlier established cohort filter expression now.
  expected:
    tools:
      required:
      - set_spans_filter
    tool_call_args:
      set_spans_filter:
        condition:
          contains_all:
          - attributes['experiment.cohort'] == 'cohort-filter-tool-result-p10-01'
    budgets:
      max_tool_calls: 1
  metadata:
    context_pruning:
      task_type: B
      carrier: tool_result
      position: p10
      archetype: filter
      needle: attributes['experiment.cohort'] == 'cohort-filter-tool-result-p10-01'
      depth_tokens: 5000
      seed: 20260703
      gate: type_b_5k
