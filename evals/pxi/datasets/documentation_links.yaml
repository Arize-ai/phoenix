dataset_name: documentation_links
description: PXI server-side eval suite for canonical Phoenix documentation markdown links.
evaluators:
  - documentation_tools_used
  - documentation_links_valid
examples:
  - id: install-phoenix-locally
    splits: [regression]
    input:
      messages:
        - role: user
          content: How do I install Phoenix locally?
    expected:
      tools:
        required: []
        documentation_any:
          - search_phoenix
          - query_docs_filesystem_phoenix
      links:
        canonical_docs_domain: https://arize.com/docs/phoenix
    metadata:
      category: documentation
  - id: trace-openai-application
