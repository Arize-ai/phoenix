dataset_name: in_app_links
description: PXI server-side eval suite for root-relative Phoenix UI markdown links.
evaluators:
  - in_app_links_valid
  - correct_tools_called
examples:
  - id: agent-settings-link
    splits: [regression]
    input:
      messages:
        - role: user
          content: Link me to the Phoenix agent settings page.
    expected:
      tools:
        required: []
      links:
        required_in_app:
          - /settings/agents
    metadata: {}
  - id: ai-provider-settings-link
    # Currently fails because the agent dispatches `bash` (deferred) in
    # parallel with `search_phoenix`, which terminates the agent run on
    # DeferredToolRequests before any text answer is composed. The
    # forbidden-bash assertion documents the desired behavior: answer
    # from knowledge / docs search, no bash. See notes.md for the
    # pydantic_ai deferred-tool semantics that drive this.
    splits: [dev]
    input:
      messages:
        - role: user
          content: Where can I configure AI providers in Phoenix? Include a link.
    expected:
      tools:
        required: []
        forbidden: [bash]
      links:
        required_in_app:
          - /settings/providers
    metadata: {}
  - id: general-settings-link
    splits: [regression]
    input:
      messages:
        - role: user
          content: Link me to the Phoenix general settings page.
    expected:
      tools:
        required: []
      links:
        required_in_app:
          - /settings/general
    metadata: {}
  - id: dataset-resource-link
    # Tests that the agent can compose a dataset-experiments URL from
    # primed page-context filesystem content. Production PXI populates
    # /phoenix/page-context.json when the user is on a dataset page;
    # this example simulates that by priming a bash `cat` of that file
    # so the agent enters mid-loop with the dataset's relay id visible.
    # Without that priming, the agent has no way to discover the id and
    # spins on tool calls. See notes.md.
    splits: [dev]
    input:
      messages:
        - role: user
          content: Link me to where I can see experiments for my PXI link evals dataset.
        - role: assistant
          tool_calls:
            - id: t1
              name: bash
              args:
                command: cat /phoenix/page-context.json
        - role: tool
          tool_call_id: t1
          name: bash
          content: |
            {
              "page": "dataset_details",
              "dataset": {
                "id": "RGF0YXNldDox",
                "name": "PXI link evals",
                "exampleCount": 12
              }
            }
    expected:
      tools:
        required: []
      links:
        required_in_app:
          - /datasets/RGF0YXNldDox/experiments
    metadata: {}
