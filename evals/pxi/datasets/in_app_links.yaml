        - role: tool
          tool_call_id: route_info
          name: get_route_info
          content: |
            {"query":"default retention policy","matches":[{"path":"/settings/general","label":"General Settings","description":"Configure workspace settings, default project retention policies, and project creation defaults.","link":"/settings/general","missingParams":[]}]}
    expected:
      tools:
        required: []
        forbidden: [bash]
      links:
        required_in_app:
          - /settings/general
    metadata:
      route_info_case: retention_settings
