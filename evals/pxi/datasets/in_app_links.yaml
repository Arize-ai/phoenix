            {"query":"data retention policy","matches":[{"path":"/settings/data","label":"Data Retention","description":"Manage trace retention policies and retention policy configuration.","keywords":["data retention","retention policy","trace retention","purge traces","delete old traces","storage retention"],"link":"/settings/data","missingParams":[]}]}
    expected:
