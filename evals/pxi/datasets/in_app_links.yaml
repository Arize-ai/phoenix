dataset_name: in_app_links
description: PXI server-side eval suite for root-relative Phoenix UI markdown links after route-info lookup.
evaluators:
  - in_app_links_valid
  - correct_tools_called
examples:
  - id: route-info-agent-settings-link
    splits: [regression]
    input:
      messages:
        - role: user
          content: Link me to the Phoenix agent settings page.
        - role: assistant
          tool_calls:
            - id: route_info
              name: get_route_info
              args:
                query: agent settings
        - role: tool
          tool_call_id: route_info
          name: get_route_info
          content: |
            {"query":"agent settings","matches":[{"path":"/settings/agents","label":"Agent Settings","description":"Configure PXI and agent behavior.","keywords":["agent settings","PXI settings"],"link":"/settings/agents","missingParams":[]}]}
    expected:
      tools:
        required: []
        forbidden: [bash]
      links:
        required_in_app:
          - /settings/agents
    metadata:
      route_info_case: static_settings_route
  - id: route-info-ai-provider-settings-link
    splits: [regression]
    input:
      messages:
        - role: user
          content: Where can I configure AI providers in Phoenix? Include a link.
        - role: assistant
          tool_calls:
            - id: route_info
              name: get_route_info
              args:
                query: AI provider settings
        - role: tool
          tool_call_id: route_info
          name: get_route_info
          content: |
            {"query":"AI provider settings","matches":[{"path":"/settings/providers","label":"AI Providers","description":"Configure AI provider credentials and provider settings.","keywords":["AI providers","provider credentials","model provider"],"link":"/settings/providers","missingParams":[]}]}
    expected:
      tools:
        required: []
        forbidden: [bash]
      links:
        required_in_app:
          - /settings/providers
    metadata:
      route_info_case: static_settings_route
