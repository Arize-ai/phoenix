          content: |
            {"query":"default retention policy","matches":[{"path":"/settings/general","label":"General Settings","description":"Configure workspace settings, default project retention policies, and project creation defaults.","keywords":["general settings","default retention policy","project retention"],"link":"/settings/general","missingParams":[]}]}
    expected:
      tools:
        required: []
        forbidden: [bash]
      links:
        required_in_app:
