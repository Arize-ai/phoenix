dataset_name: set_spans_filter
description: PXI server-side eval suite for deferred set_spans_filter tool calls.
evaluators:
  - correct_tools_called
  - tool_call_args_match
  - tool_call_count_within_limit
examples:
  - id: llm-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me only LLM spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: tool-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter the table to tool spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'TOOL'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: error-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans that errored.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'ERROR'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: slow-spans
    # "at least five seconds" pins the 5000ms threshold but the operator
    # form (>=, >) and whitespace are model choices. ``contains_all``
    # checks the substantive content; ``not_contains`` catches a
    # plausible inverted-threshold failure mode (``latency_ms < 5000``).
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show slow spans taking at least five seconds.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["latency_ms", "5000"]
            not_contains: ["latency_ms < ", "latency_ms <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: slow-llm-spans
    # Multi-clause AND: ``contains_all`` is order-invariant so the model
    # can emit clauses in either order. Both clauses must appear.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show slow LLM calls taking at least five seconds.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["span_kind == 'LLM'", "latency_ms >= 5000"]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: trace-id
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to trace id 8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: trace_id == '8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: span-name
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans named retrieve_documents.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: name == 'retrieve_documents'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: input-substring
    # The Phoenix DSL only supports Python's ``in`` operator for substring
    # matching (``'<needle>' in input.value``); the parser maps it to a
    # ``TextContains`` call. There is no ``.contains()`` form. This matcher
    # pins the DSL's ``in input.value`` form while allowing quote/spacing drift.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans where the input mentions refund policy.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["refund policy", "in input.value"]
            not_contains: [".contains("]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: annotation-label
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans marked hallucinated by the Hallucination annotation.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: annotations['Hallucination'].label == 'hallucinated'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: reset-filter
    splits: [regression]
    input:
      messages:
        - role: user
          content: Clear the span filter and return to the default root spans view.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: parent_id is None
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: chain-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to the chain spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'CHAIN'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: agent-root-spans
    # Genuinely ambiguous: "top-level agent traces" can resolve to either
    # filtering by AGENT span_kind alongside the root predicate, or just the
    # root predicate on its own. Accept either via variants.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me top-level agent traces only.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          - condition:
              contains_all: ["span_kind == 'AGENT'", "parent_id is None"]
          - condition: parent_id is None
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  - id: embedding-spans-lowercase
    splits: [regression]
    input:
      messages:
        - role: user
          content: just embeddings pls
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'EMBEDDING'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: status-ok-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show only successful spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'OK'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: status-unset-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: show me spans that have no status set
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'UNSET'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: high-prompt-tokens
    splits: [regression]
    input:
      messages:
        - role: user
          content: find LLM calls that used more than 10k prompt tokens
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["span_kind == 'LLM'", "llm.token_count.prompt", "10000"]
            not_contains: ["llm.token_count.prompt < ", "llm.token_count.prompt <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: cumulative-tokens-roots
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show traces that burned over 50k tokens in total.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all:
              ["cumulative_token_count.total", "50000", "parent_id is None"]
            not_contains: ["cumulative_token_count.total < ", "cumulative_token_count.total <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: start-after-timestamp
    # Prompt names a UTC timestamp explicitly, so the model should emit the
    # exact string. Literal expectation pins the canonical form.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to spans that started at or after 2025-01-15T00:00:00Z.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: start_time >= '2025-01-15T00:00:00Z'
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  # Original query "Show me span <id>" was unstable: the agent sometimes
  # called bash + phoenix-gql to look up a single span by ID rather than
  # filtering the table. Re-phrased to lock filter intent.
  - id: span-by-id
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter the spans table to span 7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_id == '7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b'
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  - id: children-of-parent
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me direct children of span 7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: parent_id == '7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: annotation-score
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans where the Helpfulness annotation scored above 0.8.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["annotations['Helpfulness'].score", "0.8"]
            not_contains: ["annotations['Helpfulness'].score < ", "annotations['Helpfulness'].score <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: output-substring
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans whose response mentions error code 502.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["502", "output.value"]
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  - id: metadata-access
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to spans tagged with environment 'prod' in metadata.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: metadata['environment'] == 'prod'
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  - id: agent-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me agent spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'AGENT'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: retriever-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to retriever spans only.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'RETRIEVER'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: not-llm-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me everything that's not an LLM call.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind != 'LLM'
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  - id: fast-spans-under-100ms
    # "under 100ms" pins the threshold; the operator (<, <=) and whitespace
    # are free. ``not_contains`` rules out the inverted ``latency_ms >`` form.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to spans under 100ms latency.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["latency_ms", "100"]
            not_contains: ["latency_ms > ", "latency_ms >= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: llm-or-tool-spans
    # OR semantics: ``contains_all`` of just the literal values matches both
    # ``span_kind == 'LLM' or span_kind == 'TOOL'`` and the equivalent
    # ``span_kind in ('LLM', 'TOOL')`` form the parser accepts.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me LLM or tool calls.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["LLM", "TOOL"]
            not_contains: ["!=", "not_in", "not in"]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: high-completion-tokens
    splits: [regression]
    input:
      messages:
        - role: user
          content: Find LLM calls that produced more than 2000 completion tokens.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["span_kind == 'LLM'", "llm.token_count.completion", "2000"]
            not_contains: ["llm.token_count.completion < ", "llm.token_count.completion <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: ended-before-timestamp
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans that ended before 2025-01-15T12:00:00Z.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: end_time < '2025-01-15T12:00:00Z'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: status-message-substring
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to spans whose status message mentions 'timeout'.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["timeout", "status_message"]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: attribute-path-access
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans where attribute 'user.id' equals 'alice'.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: attributes['user.id'] == 'alice'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: three-clause-conjunction
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show errored LLM calls slower than 3 seconds.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["span_kind == 'LLM'", "status_code == 'ERROR'", "latency_ms", "3000"]
            not_contains: ["latency_ms < ", "latency_ms <= "]
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: ambiguous-fast-spans
    # Genuinely ambiguous threshold ("fast" without a number). We require
    # set_spans_filter is called but do not pin a specific threshold; any
    # downward-bounded latency clause counts.
    splits: [regression]
    input:
      messages:
        - role: user
          content: show me fast spans
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["latency_ms"]
            not_contains: ["latency_ms > ", "latency_ms >= "]
    metadata:
      annotation:
        agreement: low
        n_opinions: 3
  - id: ambiguous-tools-or-retrievers
    splits: [regression]
    input:
      messages:
        - role: user
          content: show me tool or retriever spans only
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["TOOL", "RETRIEVER"]
            not_contains: ["!=", "not_in", "not in"]
    metadata:
      annotation:
        agreement: medium
        n_opinions: 3
  # Original bare fragment "everything except tool calls" sometimes read as
  # a description rather than a filter request. Re-phrased imperatively.
  - id: ambiguous-not-tool-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: show me everything except tool calls
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind != 'TOOL'
    metadata:
      annotation:
        agreement: high
        n_opinions: 3
  - id: negative-greeting
