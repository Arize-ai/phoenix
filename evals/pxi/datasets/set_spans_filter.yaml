dataset_name: set_spans_filter
description: PXI server-side eval suite for deferred set_spans_filter tool calls.
evaluators:
  - correct_tools_called
  - set_spans_filter_args_match
examples:
  - id: llm-spans
    split: regression
    input:
      query: Show me only LLM spans.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM'
          rootSpansOnly: false
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: tool-spans
    split: regression
    input:
      query: Filter the table to tool spans.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'TOOL'
          rootSpansOnly: false
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: error-spans
    split: regression
    input:
      query: Show spans that errored.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'ERROR'
          rootSpansOnly: false
    metadata:
      category: status
      annotation:
        agreement: high
        n_opinions: 3
  - id: slow-spans
    split: regression
    input:
      query: Show slow spans taking at least five seconds.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: latency_ms >= 5000
    metadata:
      category: latency
      annotation:
        agreement: high
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: Latency filter doesn't target nested spans per spec; rootSpansOnly is not mandated. Both A and B omit it (B fully, A explicitly). Omitting follows
          the schema 'unsure → omit' rule. Existing block pinned rootSpansOnly: false."
  - id: slow-llm-spans
    split: regression
    input:
      query: Show slow LLM calls taking at least five seconds.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM' and latency_ms >= 5000
          rootSpansOnly: false
    metadata:
      category: latency
      annotation:
        agreement: high
        n_opinions: 3
  - id: trace-id
    split: regression
    input:
      query: Filter to trace id 8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: trace_id == '8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5'
    metadata:
      category: trace
      annotation:
        agreement: high
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: trace_id filter does not target nested spans specifically; rootSpansOnly not mandated by spec. Both A and B omit it. Existing pinned rootSpansOnly:
          false."
  - id: span-name
    split: regression
    input:
      query: Show spans named retrieve_documents.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: name == 'retrieve_documents'
          rootSpansOnly: false
    metadata:
      category: name
      annotation:
        agreement: high
        n_opinions: 3
  - id: input-substring
    split: regression
    input:
      query: Show spans where the input mentions refund policy.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: "'refund policy' in input.value"
          rootSpansOnly: false
    metadata:
      category: input
      annotation:
        agreement: high
        n_opinions: 3
  - id: annotation-label
    split: regression
    input:
      query: Show spans marked hallucinated by the Hallucination annotation.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: annotations['Hallucination'].label == 'hallucinated'
          rootSpansOnly: false
    metadata:
      category: annotation
      annotation:
        agreement: high
        n_opinions: 3
  - id: reset-filter
    split: regression
    input:
      query: Clear the span filter and return to the default root spans view.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: ''
          rootSpansOnly: true
    metadata:
      category: reset
      annotation:
        agreement: high
        n_opinions: 3
  - id: chain-spans
    split: regression
    input:
      query: Filter to the chain spans.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'CHAIN'
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: agent-root-spans
    split: regression
    input:
      query: Show me top-level agent traces only.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          - condition: span_kind == 'AGENT'
            rootSpansOnly: true
          - condition: ''
            rootSpansOnly: true
    metadata:
      category: ambiguity
      annotation:
        agreement: medium
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: Query is intentionally ambiguous (author intent polarity=ambiguous). Candidate A's variant list captures both reasonable shapes; B's single shape
          is one of those variants. Existing block omitted tool_call_args entirely; we pin variants sinc"
  - id: embedding-spans-lowercase
    split: regression
    input:
      query: just embeddings pls
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'EMBEDDING'
          rootSpansOnly: false
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: status-ok-spans
    split: regression
    input:
      query: Show only successful spans.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'OK'
          rootSpansOnly: false
    metadata:
      category: status
      annotation:
        agreement: high
        n_opinions: 3
  - id: status-unset-spans
    split: regression
    input:
      query: show me spans that have no status set
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'UNSET'
          rootSpansOnly: false
    metadata:
      category: status
      annotation:
        agreement: high
        n_opinions: 3
  - id: high-prompt-tokens
    split: regression
    input:
      query: find LLM calls that used more than 10k prompt tokens
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM' and llm.token_count.prompt > 10000
          rootSpansOnly: false
    metadata:
      category: tokens
      annotation:
        agreement: high
        n_opinions: 3
  - id: cumulative-tokens-roots
    split: regression
    input:
      query: Show traces that burned over 50k tokens in total.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: cumulative_token_count.total > 50000
          rootSpansOnly: true
    metadata:
      category: tokens
      annotation:
        agreement: high
        n_opinions: 3
  - id: start-after-timestamp
    split: regression
    input:
      query: Filter to spans that started at or after 2025-01-15T00:00:00Z.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: start_time >= '2025-01-15T00:00:00Z'
    metadata:
      category: datetime
      annotation:
        agreement: medium
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: Timestamp filter doesn't target nested spans per spec; rootSpansOnly not mandated. A omits, B pins via exact_match and also forbids set_time_range.
          Per orchestrator rules, exact_match is omitted for positive cases and forbidden is only used"
  # Original query "Show me span <id>" was unstable: the agent
  # sometimes called bash + phoenix-gql to look up a single span by ID
  # rather than filtering the table. Re-phrased to make filter intent
  # explicit ("filter the spans table to span <id>"). See triage notes.
  - id: span-by-id
    split: regression
    input:
      query: Filter the spans table to span 7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_id == '7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b'
    metadata:
      category: identifier
      annotation:
        agreement: medium
        n_opinions: 3
        notes: |
          Backfill orchestrator change: dropped rootSpansOnly per
          omit-if-unsure rule (span_id query doesn't determine root vs
          nested scope).
      triage:
        category: dataset_annotation
        notes: |
          Original query "Show me span <id>" caused non-determinism:
          some runs the agent called set_spans_filter, other runs it
          called bash + phoenix-gql to fetch the span directly. Both
          interpretations are defensible. Re-phrased with "Filter the
          spans table to <id>" to lock filter intent. Original kept
          here for audit.
  - id: children-of-parent
    split: regression
    input:
      query: Show me direct children of span 7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: parent_id == '7a3f9c2e1b8d4e5f6a7b8c9d0e1f2a3b'
          rootSpansOnly: false
    metadata:
      category: identifier
      annotation:
        agreement: high
        n_opinions: 3
  - id: annotation-score
    split: regression
    input:
      query: Show spans where the Helpfulness annotation scored above 0.8.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: annotations['Helpfulness'].score > 0.8
          rootSpansOnly: false
    metadata:
      category: annotation
      annotation:
        agreement: high
        n_opinions: 3
  - id: output-substring
    split: regression
    input:
      query: Show spans whose response mentions error code 502.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          - condition: "'error code 502' in output.value"
            rootSpansOnly: false
          - condition: "'502' in output.value"
            rootSpansOnly: false
    metadata:
      category: output
      annotation:
        agreement: medium
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: Existing pinned the full phrase only; candidates A/B pinned just '502'. Both are reasonable substring choices for \"mentions error code 502\" so
          kept as variants."
  - id: metadata-access
    split: regression
    input:
      query: Filter to spans tagged with environment 'prod' in metadata.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: metadata['environment'] == 'prod'
    metadata:
      category: attribute
      annotation:
        agreement: medium
        n_opinions: 3
        notes: "Backfill applied orchestrator's expected: Metadata filter doesn't target a non-CHAIN/AGENT span_kind; rootSpansOnly is not mandated by spec. Majority (A and C-template) omit it, so omitting
          matches the schema rule \"omit rootSpansOnly when query doesn't determine it\"."
  - id: agent-spans
    split: regression
    input:
      query: Show me agent spans.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'AGENT'
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: retriever-spans
