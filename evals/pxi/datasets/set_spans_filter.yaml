        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'RETRIEVER'
          rootSpansOnly: false
    metadata:
      category: span_kind
      annotation:
        agreement: high
        n_opinions: 3
  - id: not-llm-spans
    split: regression
