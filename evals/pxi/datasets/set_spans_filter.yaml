  # ----- contextual dev examples (primed page state / tool history) -----
  - id: contextual-latest-root-traces
    # Primes a prior bash tool call + return so the agent enters mid-loop
    # already knowing the latest traces in the project are from 2026-04-03.
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:43:38-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: "span_kind == 'LLM'"
      messages:
        - role: user
          content: Show me only the latest traces in this project.
        - role: assistant
          tool_calls:
            - id: t1
              name: bash
              args:
                command: >-
                  phoenix-gql '{ node(id: "UHJvamVjdDoxMg==") { ... on Project
                  { spans(first: 5, rootSpansOnly: true, sort: {col: startTime,
                  dir: desc}) { edges { node { startTime } } } } } }'
        - role: tool
          tool_call_id: t1
          name: bash
          content: |
            {"data":{"node":{"spans":{"edges":[
              {"node":{"startTime":"2026-04-03T18:42:11Z"}},
              {"node":{"startTime":"2026-04-03T18:41:58Z"}},
              {"node":{"startTime":"2026-04-03T17:55:02Z"}},
              {"node":{"startTime":"2026-04-03T17:12:30Z"}},
              {"node":{"startTime":"2026-04-03T16:48:14Z"}}
            ]}}}}
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["start_time", "2026-04-03"]
      budgets:
        max_tool_calls: 1
    metadata:
      source_trace: 22a9b76db9443f91d27887c0bab55481
  - id: contextual-slow-llm-from-distribution
    # Tests data-informed threshold selection. The user says "slow" without
    # a number, so the agent must use the primed bash output (LLM latency
    # percentiles) to pick a threshold. We require the condition mention
    # ``latency_ms`` and ``span_kind == 'LLM'``, reject inverted operators,
