dataset_name: set_spans_filter
description: PXI server-side eval suite for deferred set_spans_filter tool calls.
evaluators:
  - correct_tools_called
  - tool_call_args_match
  - tool_call_count_within_limit
examples:
  - id: llm-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show me only LLM spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM'
          rootSpansOnly: false
    metadata:
      category: span_kind
  - id: tool-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter the table to tool spans.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'TOOL'
          rootSpansOnly: false
    metadata:
      category: span_kind
  - id: error-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans that errored.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'ERROR'
          rootSpansOnly: false
    metadata:
      category: status
  - id: slow-spans
    # "at least five seconds" pins the 5000ms threshold but the operator
    # form (>=, >) and whitespace are model choices. ``contains_all``
    # checks the substantive content; ``not_contains`` catches a
    # plausible inverted-threshold failure mode (``latency_ms < 5000``).
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show slow spans taking at least five seconds.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["latency_ms", "5000"]
            not_contains: ["latency_ms < ", "latency_ms <= "]
          rootSpansOnly: false
    metadata:
      category: latency
  - id: slow-llm-spans
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show slow LLM calls taking at least five seconds.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["span_kind == 'LLM'", "latency_ms >= 5000"]
          rootSpansOnly: false
    metadata:
      category: latency
  - id: trace-id
    splits: [regression]
    input:
      messages:
        - role: user
          content: Filter to trace id 8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: trace_id == '8f3c2d1e0a9b4c5d6e7f8091a2b3c4d5'
          rootSpansOnly: false
    metadata:
      category: trace
  - id: span-name
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans named retrieve_documents.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: name == 'retrieve_documents'
          rootSpansOnly: false
    metadata:
      category: name
  - id: input-substring
    # The Phoenix DSL uses ``'<needle>' in input.value`` for substring
    # matching, but ``input.value contains '<needle>'`` is a plausible
    # alternative the model might emit. Accept any spelling that
    # references both the needle and the ``input.value`` column.
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans where the input mentions refund policy.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["refund policy", "input.value"]
          rootSpansOnly: false
    metadata:
      category: input
  - id: annotation-label
    splits: [regression]
    input:
      messages:
        - role: user
          content: Show spans marked hallucinated by the Hallucination annotation.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: annotations['Hallucination'].label == 'hallucinated'
          rootSpansOnly: false
    metadata:
      category: annotation
  - id: reset-filter
    splits: [regression]
    input:
      messages:
        - role: user
          content: Clear the span filter and return to the default root spans view.
    expected:
      tools:
        required: [set_spans_filter]
      tool_call_args:
        set_spans_filter:
          condition: ""
          rootSpansOnly: true
    metadata:
      category: reset
  - id: contextual-latest-root-traces
    splits: [dev]
    # This example primes a prior bash tool call + return so the agent enters
    # mid-loop already knowing the latest traces in the project are from
    # 2026-04-03. The conversation prefix ends with the bash tool return --
    # there is no fake user follow-up and no fake assistant narration (real
    # PXI traces show no text between tool calls). The score is whatever
    # action the agent takes NEXT: we expect set_spans_filter with a
    # condition referencing start_time and 2026-04-03 (any clause ordering,
    # any timestamp format), with rootSpansOnly left unconstrained.
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:43:38-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: "span_kind == 'LLM'"
          rootSpansOnly: false
      messages:
        - role: user
          content: Show me only the latest traces in this project.
        - role: assistant
          tool_calls:
            - id: t1
              name: bash
              args:
                command: >-
                  phoenix-gql '{ node(id: "UHJvamVjdDoxMg==") { ... on Project
                  { spans(first: 5, rootSpansOnly: true, sort: {col: startTime,
                  dir: desc}) { edges { node { startTime } } } } } }'
        - role: tool
          tool_call_id: t1
          name: bash
          content: |
            {"data":{"node":{"spans":{"edges":[
              {"node":{"startTime":"2026-04-03T18:42:11Z"}},
              {"node":{"startTime":"2026-04-03T18:41:58Z"}},
              {"node":{"startTime":"2026-04-03T17:55:02Z"}},
              {"node":{"startTime":"2026-04-03T17:12:30Z"}},
              {"node":{"startTime":"2026-04-03T16:48:14Z"}}
            ]}}}}
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["start_time", "2026-04-03"]
      budgets:
        max_tool_calls: 1
    metadata:
      category: contextual_followup
      source: curated_from_pxi_trace_review
      source_trace: 22a9b76db9443f91d27887c0bab55481
      page: project_traces_table
      primed_tool_history: bash
  - id: contextual-slow-llm-from-distribution
    # Tests data-informed threshold selection. The user says "slow" without
    # a number, so the agent must use the primed bash output (LLM latency
    # percentiles) to pick a threshold. We don't pin the exact threshold --
    # any number is fine -- but we do require the condition reference both
    # ``latency_ms`` and ``span_kind == 'LLM'``, and we reject inverted
    # operators that would return fast spans instead of slow ones.
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T15:02:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: ""
          rootSpansOnly: false
      messages:
        - role: user
          content: Show me only the slow LLM calls in this project.
        - role: assistant
          tool_calls:
            - id: t1
              name: bash
              args:
                command: >-
                  phoenix-gql '{ node(id: "UHJvamVjdDoxMg==") { ... on Project {
                  p50: spanLatencyMsQuantile(probability: 0.5, filterCondition:
                  "span_kind == ''LLM''") p90: spanLatencyMsQuantile(probability:
                  0.9, filterCondition: "span_kind == ''LLM''") p95:
                  spanLatencyMsQuantile(probability: 0.95, filterCondition:
                  "span_kind == ''LLM''") p99: spanLatencyMsQuantile(probability:
                  0.99, filterCondition: "span_kind == ''LLM''") } } }'
        - role: tool
          tool_call_id: t1
          name: bash
          content: |
            {"data":{"node":{
              "p50": 312,
              "p90": 1840,
              "p95": 3210,
              "p99": 8420
            }}}
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_spans_filter:
          condition:
            contains_all: ["latency_ms", "span_kind == 'LLM'"]
            not_contains: ["latency_ms < ", "latency_ms <= "]
      budgets:
        max_tool_calls: 1
    metadata:
      category: data_informed_threshold
      source: curated_from_pxi_trace_review
      page: project_traces_table
      primed_tool_history: bash
  - id: contextual-keep-filter-switch-root-spans
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:45:12-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: "status_code == 'ERROR'"
          rootSpansOnly: false
      messages:
        - role: user
          content: Keep the error filter, but only show root spans.
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_spans_filter:
          condition: status_code == 'ERROR'
          rootSpansOnly: true
      budgets:
        max_tool_calls: 1
    metadata:
      category: contextual_followup
      source: curated_from_pxi_trace_review
      page: project_traces_table
