        n_opinions: 3
  - id: three-clause-conjunction
    split: regression
    input:
      query: Show errored LLM calls slower than 3 seconds.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM' and status_code == 'ERROR' and latency_ms > 3000
          rootSpansOnly: false
    metadata:
