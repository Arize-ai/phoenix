        agreement: high
        n_opinions: 3
        notes: Existing expected kept. Orchestrator recommended a different shape (Docs query — in eval runs without the docs MCP toolset, the agent should answer from training knowledge with no tool 
          call. Pure-negative.) but the existing form passes the harness and is more permissive/targeted for this tool-specific dataset.
