    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind != 'LLM'
    metadata:
      category: operator
      annotation:
        agreement: medium
        n_opinions: 3
        notes: rootSpansOnly genuinely ambiguous; 2/3 opinions omit it. Orchestrator followed majority.
  - id: fast-spans-under-100ms
    split: regression
    input:
      query: Filter to spans under 100ms latency.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: latency_ms < 100
    metadata:
      category: latency
      annotation:
        agreement: high
        n_opinions: 3
  - id: llm-or-tool-spans
    split: regression
    input:
      query: Show me LLM or tool calls.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM' or span_kind == 'TOOL'
          rootSpansOnly: false
    metadata:
      category: combination
      annotation:
        agreement: high
        n_opinions: 3
  - id: high-completion-tokens
    split: regression
    input:
      query: Find LLM calls that produced more than 2000 completion tokens.
    expected:
      tools:
        required:
          - set_spans_filter
      tool_call_args:
        set_spans_filter:
          condition: span_kind == 'LLM' and llm.token_count.completion > 2000
