dataset_name: dataset_page_tools
description: PXI dev evals for dataset-page questions that should begin by inspecting Phoenix page context with bash.
evaluators:
  - correct_tools_called
  - bash_command_substrings_match
  - tool_call_count_within_limit
examples:
  - id: describe-current-dataset
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:50:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
      messages:
        - role: user
          content: I am looking at a Phoenix dataset details page. The dataset page context is available in the Phoenix agent filesystem.
        - role: user
          content: Describe this dataset.
    expected:
      tools:
        required: [bash]
        forbidden: [ask_user, query_docs_filesystem_phoenix, search_phoenix]
      bash_command:
        - contains: [/phoenix/agent-start.md]
        - contains: [/phoenix/page-context.json]
        - contains: [dataset]
          not_contains: [docs search]
      budgets:
        max_tool_calls: 1
    metadata: {}
  - id: latest-experiment-current-dataset
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:52:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
      messages:
        - role: user
          content: I am on a Phoenix dataset page and want information about this dataset, not general documentation.
        - role: user
          content: When was the latest experiment on this dataset run?
    expected:
      tools:
        required: [bash]
        forbidden: [ask_user, query_docs_filesystem_phoenix, search_phoenix]
      bash_command:
        - contains: [/phoenix/agent-start.md]
        - contains: [experiment]
          not_contains: [docs search]
        - contains: [dataset]
          not_contains: [docs search]
      budgets:
        max_tool_calls: 1
    metadata: {}
  - id: dataset-splits
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:54:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
      messages:
        - role: user
          content: I am looking at the Phoenix dataset details page for the dataset I mean.
        - role: user
          content: Are there any splits in this dataset?
    expected:
      tools:
        required: [bash]
        forbidden: [ask_user, query_docs_filesystem_phoenix, search_phoenix]
      bash_command:
        - contains: [/phoenix/agent-start.md]
        - contains: [split]
          not_contains: [docs search]
        - contains: [dataset]
          not_contains: [docs search]
      budgets:
        max_tool_calls: 1
    metadata: {}
  - id: examples-per-split
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:55:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
      messages:
        - role: user
          content: I am on a Phoenix dataset page. Use the current dataset context from the agent filesystem.
        - role: user
          content: How many examples are in each split?
    expected:
      tools:
        required: [bash]
        forbidden: [ask_user, query_docs_filesystem_phoenix, search_phoenix]
      bash_command:
        - contains: [/phoenix/agent-start.md]
        - contains: [split]
          not_contains: [docs search]
        - contains: [example]
          not_contains: [docs search]
      budgets:
        max_tool_calls: 1
    metadata: {}
