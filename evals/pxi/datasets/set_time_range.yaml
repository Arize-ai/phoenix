dataset_name: set_time_range
description: PXI eval suite for the deferred set_time_range tool. Covers preset
  enum values, custom bounded and open-ended ranges, ambiguous relative time
  requests, and negative cases where another tool or no tool should be used.
evaluators:
  - correct_tools_called
  - tool_call_args_match

examples:
  - id: preset-15m
    split: regression
    input:
      query: Show me just the last 15 minutes.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "15m"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-1h
    split: regression
    input:
      query: Filter this view to the last hour.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "1h"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-12h
    split: regression
    input:
      query: past 12 hrs only
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "12h"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-1d
    split: regression
    input:
      query: I want the last 24 hours of traces.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "1d"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-7d
    split: regression
    input:
      query: Can you set the range to the past week?
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "7d"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-30d
    split: regression
    input:
      query: zoom out to the last month
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: "30d"
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: custom-explicit-utc-range
    split: regression
    input:
      query: Set the range from 2025-01-01T00:00:00Z to 2025-01-31T23:59:59Z.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime: "2025-01-01T00:00:00Z"
          endTime: "2025-01-31T23:59:59Z"
    metadata:
      category: custom_range
      difficulty: obvious
      polarity: positive

  - id: custom-explicit-offset-range
    split: regression
    input:
      query: Show traces between 2025-03-10T08:30:00-07:00 and 2025-03-10T11:00:00-07:00.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime: "2025-03-10T08:30:00-07:00"
          endTime: "2025-03-10T11:00:00-07:00"
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive

  - id: custom-open-start
    split: regression
    input:
      query: Everything until 2025-04-01T00:00:00Z.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          endTime: "2025-04-01T00:00:00Z"
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: custom range may omit startTime for an open-start interval

  - id: custom-open-end
    split: regression
    input:
      query: Show traces since 2025-04-01T09:00:00Z.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime: "2025-04-01T09:00:00Z"
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: custom range may omit endTime for an open-ended interval

  - id: custom-specific-day
    split: regression
    input:
      query: I need traces from January 15, 2025.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00Z"
            endTime: "2025-01-15T23:59:59Z"
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00Z"
            endTime: "2025-01-16T00:00:00Z"
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00"
            endTime: "2025-01-16T00:00:00"
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: calendar-day bounds have valid inclusive, exclusive, and local-time forms

  - id: ambiguous-today
    split: regression
    input:
      query: just show today
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - { timeRangeKey: "1d" }
          - { timeRangeKey: custom }
    metadata:
      category: ambiguity
      difficulty: tricky
      polarity: positive
      notes: today can mean rolling last day or the current calendar day

  - id: ambiguous-recent
    split: regression
    input:
      query: focus on recent traces
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - { timeRangeKey: "15m" }
          - { timeRangeKey: "1h" }
          - { timeRangeKey: "12h" }
    metadata:
      category: ambiguity
      difficulty: tricky
      polarity: positive
      notes: recent has no canonical window, so accept short preset choices only

  - id: negative-span-kind-filter
    split: regression
    input:
      query: Show me only LLM spans.
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [set_time_range]
    metadata:
      category: negative_wrong_tool
      difficulty: obvious
      polarity: negative

  - id: negative-latency-filter
    split: regression
    input:
      query: only spans that took more than five seconds
    expected:
      tools:
        required: [set_spans_filter]
        forbidden: [set_time_range]
    metadata:
      category: negative_wrong_tool
      difficulty: moderate
      polarity: negative
      notes: latency is a span filter, not the global time range

  - id: negative-prompt-clone
    split: regression
    input:
      query: Clone the current prompt so I can compare a shorter version.
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative_wrong_tool
      difficulty: obvious
      polarity: negative
      notes: playground prompt tools are not exposed in the project-only eval context

  - id: negative-read-current-prompt
    split: regression
    input:
      query: What's in prompt A right now?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative_wrong_tool
      difficulty: moderate
      polarity: negative
      notes: playground prompt tools are not exposed in the project-only eval context

  - id: negative-longest-span
    split: regression
    input:
      query: Which span took the longest time to complete?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative_analysis
      difficulty: tricky
      polarity: negative
      notes: asks for analysis of span latency, not the time range selector

  - id: negative-explain-time-range
    split: regression
    input:
      query: What does the time range selector do?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative_definitional
      difficulty: obvious
      polarity: negative
      notes: definitional docs lookups are valid, but the selector should not be changed

  - id: negative-greeting
    split: regression
    input:
      query: hey, what can you help me with?
    expected:
      tools:
        required: []
        forbidden: [set_time_range]
        exact_match: true
    metadata:
      category: negative_chitchat
      difficulty: obvious
      polarity: negative

  - id: negative-thanks
    split: regression
    input:
      query: thanks!
    expected:
      tools:
        required: []
        forbidden: [set_time_range]
        exact_match: true
    metadata:
      category: negative_chitchat
      difficulty: obvious
      polarity: negative
