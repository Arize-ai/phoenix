dataset_name: set_time_range
description: PXI eval suite for the deferred set_time_range tool. Covers preset
  enum values (15m, 1h, 12h, 1d, 7d, 30d), custom ranges with explicit start/end
  times, open-ended ranges, ambiguous calendar phrasing, and negative cases
  where the tool should not be called.
evaluators:
  - correct_tools_called
  - tool_call_args_match

examples:
  # ---------------------------------------------------------------
  # Preset enum coverage — one obvious phrasing per enum literal.
  # ---------------------------------------------------------------
  - id: preset-15m
    splits: [regression]
    input:
      query: Show me the last 15 minutes.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 15m
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-1h
    splits: [regression]
    input:
      query: Filter to the last hour.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 1h
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-12h
    splits: [regression]
    input:
      query: Switch the time range to the past 12 hours please.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 12h
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  - id: preset-1d
    splits: [regression]
    input:
      query: last 24 hours
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 1d
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive
      voice: fragment

  - id: preset-7d
    splits: [regression]
    input:
      query: Can you set this to the past week?
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 7d
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive
      voice: question

  - id: preset-30d
    splits: [regression]
    input:
      query: I want to see the last 30 days of traces.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 30d
    metadata:
      category: preset
      difficulty: obvious
      polarity: positive

  # ---------------------------------------------------------------
  # Preset coverage — moderate phrasings (relative calendar words
  # that resolve to a preset).
  # ---------------------------------------------------------------
  - id: preset-7d-past-week
    splits: [regression]
    input:
      query: show traces from the past week
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 7d
    metadata:
      category: preset
      difficulty: moderate
      polarity: positive

  - id: preset-1h-just-now
    splits: [regression]
    input:
      query: only stuff from the last hour, nothing older
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 1h
    metadata:
      category: preset
      difficulty: moderate
      polarity: positive
      voice: casual

  - id: preset-30d-monthly
    splits: [regression]
    input:
      query: bump it out to the last month so I can see longer-term trends
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: 30d
    metadata:
      category: preset
      difficulty: moderate
      polarity: positive

  # ---------------------------------------------------------------
  # Custom range coverage — explicit ISO timestamps. Only assert the
  # preset key here; exact ISO strings depend on the browser context
  # date the agent sees, which the harness does not pin.
  # ---------------------------------------------------------------
  - id: custom-explicit-range
    splits: [regression]
    input:
      query: Set the time range from 2025-01-01T00:00:00Z to 2025-01-31T23:59:59Z.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime: "2025-01-01T00:00:00Z"
          endTime: "2025-01-31T23:59:59Z"
    metadata:
      category: custom_range
      difficulty: obvious
      polarity: positive

  - id: custom-open-ended
    splits: [regression]
    input:
      query: Show me everything since 9am today.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: open-ended; endTime should be omitted

  - id: custom-yesterday
    splits: [regression]
    input:
      query: Filter to yesterday only.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: yesterday is a fixed-day window, not a preset rolling window

  - id: custom-specific-day
    splits: [regression]
    input:
      query: I need to see traces from January 15th, 2025.
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        # The calendar day is fully specified, but two conventions are
        # both correct: inclusive end-of-day (T23:59:59) vs. exclusive
        # next-midnight (T00:00:00 of Jan 16). Each may also be emitted
        # with or without an explicit Z/timezone offset per the tool
        # docstring ("Include a timezone offset or `Z` when possible;
        # otherwise the browser interprets it in the user's local
        # timezone."). Variants cover the realistic combinations.
        set_time_range:
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00Z"
            endTime: "2025-01-15T23:59:59Z"
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00Z"
            endTime: "2025-01-16T00:00:00Z"
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00"
            endTime: "2025-01-15T23:59:59"
          - timeRangeKey: custom
            startTime: "2025-01-15T00:00:00"
            endTime: "2025-01-16T00:00:00"
    metadata:
      category: custom_range
      difficulty: moderate
      polarity: positive
      notes: explicit calendar date; multiple inclusive/exclusive + tz conventions

  # ---------------------------------------------------------------
  # Ambiguous calendar phrasing — should still call set_time_range,
  # but we don't pin the exact key choice. Just assert the tool fires.
  # ---------------------------------------------------------------
  - id: ambiguous-today
    splits: [regression]
    input:
      query: just show today
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - { timeRangeKey: 1d }      # rolling 24h
          - { timeRangeKey: custom }  # calendar-day range
    metadata:
      category: ambiguous
      difficulty: tricky
      polarity: positive
      flags: [ambiguous]
      notes: '"today" could be 1d rolling preset or a custom calendar-day range'

  - id: ambiguous-recent
    splits: [regression]
    input:
      query: focus on recent traces
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - { timeRangeKey: 15m }
          - { timeRangeKey: 1h }
          - { timeRangeKey: 12h }
          - { timeRangeKey: 1d }
          - { timeRangeKey: 7d }
    metadata:
      category: ambiguous
      difficulty: tricky
      polarity: positive
      flags: [ambiguous]
      notes: "'recent' has no canonical window; any short/medium preset is reasonable"

  - id: ambiguous-this-week
    splits: [regression]
    input:
      query: this week's data please
    expected:
      tools:
        required: [set_time_range]
      tool_call_args:
        set_time_range:
          - { timeRangeKey: 7d }      # rolling last-7-days
          - { timeRangeKey: custom }  # explicit Mon-now calendar week
    metadata:
      category: ambiguous
      difficulty: tricky
      polarity: positive
      flags: [ambiguous]
      notes: this week vs last 7 days is genuinely ambiguous

  - id: ambiguous-most-recent-traces
    splits: [regression]
    input:
      query: show me the most recent traces
    expected:
      tools:
        # Forbid the wrong filter route. We do NOT require set_time_range
        # here because the ideal multi-step path is: bash → frontend
        # GraphQL → discover when traces actually exist → set a custom
        # range. bash executes in the browser, so the harness only sees
        # the deferred bash call; the agent may legitimately stop after
        # that and never reach set_time_range in this single turn.
        forbidden: [set_spans_filter]
      tool_call_args:
        # Only enforced if set_time_range happens to fire (i.e. the
        # agent guessed a preset rather than going the bash route).
        # Any reasonable preset is acceptable; custom with a startTime
        # is also valid since the agent might infer a wide window.
        set_time_range:
          - { timeRangeKey: 15m }
          - { timeRangeKey: 1h }
          - { timeRangeKey: 12h }
          - { timeRangeKey: 1d }
          - { timeRangeKey: 7d }
          - { timeRangeKey: 30d }
          - { timeRangeKey: custom }
    metadata:
      category: ambiguous
      difficulty: tricky
      polarity: positive
      flags: [ambiguous, multi-step]
      notes: |
        "Most recent" depends on the actual data. The realistic multi-step
        path is bash+GraphQL → custom range, but bash runs in the browser
        and the harness cannot complete that loop. Accept any reasonable
        preset, custom, or a bash-then-stop path.

  # ---------------------------------------------------------------
  # Negative coverage — set_time_range must NOT be called.
  # ~30%+ of the dataset.
  # ---------------------------------------------------------------
  - id: negative-span-filter
    splits: [regression]
    input:
      query: Show me only LLM spans.
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: obvious
      polarity: negative
      notes: this is a span filter request, not a time change

  - id: negative-error-filter
    splits: [regression]
    input:
      query: Filter to spans that errored.
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: obvious
      polarity: negative

  - id: negative-greeting
    splits: [regression]
    input:
      query: hey, what can you do?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: obvious
      polarity: negative
      voice: casual

  - id: negative-explain-traces
    splits: [regression]
    input:
      query: Can you explain what a span is?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: obvious
      polarity: negative
      voice: question

  - id: negative-name-filter
    splits: [regression]
    input:
      query: Find spans named retrieve_documents.
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: moderate
      polarity: negative

  - id: negative-mentions-time-but-not-range
    splits: [regression]
    input:
      query: Which span took the longest time to complete?
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: tricky
      polarity: negative
      flags: [tricky]
      notes: mentions time but is asking about latency, not the time-range
        selector

  - id: negative-latency-filter
    splits: [regression]
    input:
      query: only show spans that took more than 5 seconds
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: tricky
      polarity: negative
      flags: [tricky]
      notes: latency filter, not a time range change

  - id: negative-thanks
    splits: [regression]
    input:
      query: thanks!
    expected:
      tools:
        forbidden: [set_time_range]
    metadata:
      category: negative
      difficulty: obvious
      polarity: negative
      voice: fragment
