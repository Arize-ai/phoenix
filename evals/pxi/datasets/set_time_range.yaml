dataset_name: set_time_range
description: PXI server-side eval suite for deferred set_time_range tool calls.
evaluators:
  - correct_tools_called
  - tool_call_args_match
  - tool_call_count_within_limit
examples:
  - id: last-hour
    splits: [regression]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:30:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: ""
          rootSpansOnly: true
      messages:
        - role: user
          content: Show traces from the last hour.
    expected:
      tools:
        required: [set_time_range]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_time_range:
          timeRangeKey: 1h
      budgets:
        max_tool_calls: 1
    metadata:
      category: relative_time
      page: project_traces_table
  - id: last-seven-days
    splits: [regression]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:30:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: ""
          rootSpansOnly: true
      messages:
        - role: user
          content: Show me traces from the last 7 days.
    expected:
      tools:
        required: [set_time_range]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_time_range:
          timeRangeKey: 7d
      budgets:
        max_tool_calls: 1
    metadata:
      category: relative_time
      page: project_traces_table
  - id: current-year
    # "This year" pins the calendar boundaries (Jan 1 2026 -> Jan 1 2027)
    # but the timestamp offset is genuinely ambiguous -- Jan 1 in LA is
    # PST (-08:00), but the model could legitimately emit PDT (-07:00,
    # the active offset on the currentDateTime), UTC (Z), or no offset
    # at all. Score the dates; leave the offset/format unconstrained.
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:30:00-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: ""
          rootSpansOnly: true
      messages:
        - role: user
          content: Set the time range to this year.
    expected:
      tools:
        required: [set_time_range]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime:
            contains_all: ["2026-01-01"]
          # End-exclusive (2027-01-01) and end-inclusive (2026-12-31) are both
          # valid "end of 2026" representations; the model may pick either.
          endTime:
            contains_any: ["2027-01-01", "2026-12-31"]
      budgets:
        max_tool_calls: 1
    metadata:
      category: calendar_time
      page: project_traces_table
  - id: contextual-old-traces-date
    splits: [dev]
    input:
      contexts:
        - type: app
          currentDateTime: "2026-05-18T14:44:02-07:00"
          timeZone: America/Los_Angeles
        - type: graphql
          mutationsEnabled: false
        - type: project
          projectNodeId: UHJvamVjdDoxMg==
          spanFilter: ""
          rootSpansOnly: true
      messages:
        - role: user
          content: Show me the latest traces.
        - role: assistant
          content: The newest traces I found in this dataset were all run on April 3, 2026.
        - role: user
          content: The time filter is wrong because those traces are older. Show the traces from that day.
    expected:
      tools:
        required: [set_time_range]
        forbidden: [bash, ask_user, query_docs_filesystem_phoenix, search_phoenix]
      tool_call_args:
        set_time_range:
          timeRangeKey: custom
          startTime:
            contains_all: ["2026-04-03"]
          endTime:
            contains_all: ["2026-04-04"]
      budgets:
        max_tool_calls: 1
    metadata:
      category: contextual_followup
      source: curated_from_pxi_trace_review
      page: project_traces_table
