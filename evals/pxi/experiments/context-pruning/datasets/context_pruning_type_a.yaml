dataset_name: context_pruning_type_a
description: Context-pruning Type A history-independent tasks across nested depths.
evaluators:
- correct_tools_called
- tool_call_args_match
- tool_call_count_within_limit
examples:
- id: type-a-01-set_spans_filter--llm-spans-5000
  splits:
  - dev
  input:
    context_pruning_prefix:
      seed: 20260703
      depth_tokens: 5000
      composition: fallback-60-tool-25-assistant-15-user
    messages: &id001
    - role: user
      content: Show me only LLM spans.
  expected:
    tools:
      required:
      - set_spans_filter
    tool_call_args:
      set_spans_filter:
        condition: span_kind == 'LLM'
        rootSpansOnly: false
  metadata:
    context_pruning:
      task_type: A
      source_id: set_spans_filter--llm-spans
      depth_tokens: 5000
      seed: 20260703
