packages:
  - packages/*
  - examples/apps/*
  # Installs @arizeai/phoenix-otel from a published tarball to validate the
  # package as an external consumer — must stay out of the workspace so the
  # tarball install is real (see its README).
  - "!examples/apps/ai-sdk-esm-example"
  - benchmarks/*

managePackageManagerVersions: true

minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - "@arizeai/openinference-core"
  # typescript@7.0.2 and its @typescript/typescript-* platform binaries were
  # published same-day as the TS 7 migration; remove once 3 days have passed.
  - typescript
  - "@typescript/*"

allowBuilds:
  # Only has a "use pnpm" preinstall guard; no build output needed.
  autoevals: false
  esbuild: true
  msw: false
  protobufjs: true
  # napi-postinstall binding fixup for jest 30's resolver.
  unrs-resolver: true

overrides:
  # Pre-existing exact pin: forces peer-dep alignment across @mastra/* packages
  # that each declare narrow hono ranges.
  "hono": "4.12.18"
  # Still load-bearing: @langchain/core and @braintrust/core pin uuid 9.x/10.x.
  "uuid@<11.1.1": ">=11.1.1"
  # Still load-bearing: some transitive still pulls in vulnerable ip-address.
  "ip-address@<10.1.1": ">=10.1.1"
