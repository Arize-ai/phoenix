# Phoenix eval CI recipe for the Vitest support-bot example.
#
# Copy this file to .github/workflows/eval-ci.yml in your repository. The job
# runs the Vitest eval suite and gates on the runner's exit code (the suite's
# acceptance criteria fail the run on a nonzero exit). Phoenix records each case
# as a run in an experiment and prints a per-experiment summary at the end.
#
# The only contracts this recipe relies on are the test runner's exit code and
# the printed summary. Both are stable across reporter versions.
#
# The Python (pytest) equivalent lives at examples/pytest-example/eval-ci.yml.

name: eval-ci

on:
  pull_request:

jobs:
  # The suite is a member of the `js/` pnpm workspace, so deps are installed
  # once at the workspace root and the suite runs from its package dir.
  evals-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: js
        run: pnpm install --frozen-lockfile
      - name: Run eval suite
        working-directory: js/examples/apps/vitest-example
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PHOENIX_COLLECTOR_ENDPOINT: ${{ secrets.PHOENIX_COLLECTOR_ENDPOINT }}
          PHOENIX_API_KEY: ${{ secrets.PHOENIX_API_KEY }}
        # Acceptance criteria in the suite fail the run on a nonzero exit.
        run: pnpm eval
