      query: Which built-in evaluators ship with Phoenix? Include a link to the docs.
    expected:
      tools:
        required: [search_phoenix]
      assistant_text:
        required_url_prefix: https://arize.com/docs/phoenix/
        markdown_link_required: true
        forbidden_url_substrings:
          - arizeai-
